<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Capital Copilot</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Preload critical loading SVG -->
    <link rel="preload" href="logo.loading.min.svg" as="image" type="image/svg+xml" fetchpriority="high" />

    <!-- Default SEO Meta Tags -->
    <meta
      name="description"
      content="Capital Copilot - AI-powered stock market terminal. Analyze stocks, track portfolios, and make smarter investment decisions."
    />
    <meta name="author" content="Perpetuator LLC" />
    <meta name="keywords" content="stock market, AI, terminal, investing, portfolio, stock analysis" />

    <!-- Open Graph Meta Tags -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Capital Copilot" />
    <meta property="og:title" content="Capital Copilot - AI-Powered Stock Market Terminal" />
    <meta
      property="og:description"
      content="Analyze stocks, track portfolios, and make smarter investment decisions with AI-powered tools."
    />
    <meta property="og:image" content="/Capital_Copilot_Logo_PFP.png" />
    <meta property="og:url" content="https://capitalcopilot.io" />

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@CapitalCopilot" />
    <meta name="twitter:title" content="Capital Copilot - AI-Powered Stock Market Terminal" />
    <meta
      name="twitter:description"
      content="Analyze stocks, track portfolios, and make smarter investment decisions with AI-powered tools."
    />
    <meta name="twitter:image" content="/Capital_Copilot_Logo_PFP.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="favicon-48x48.png" />
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="theme-color" content="#2f2f2f" />
    <meta name="application-name" content="Capital Copilot" />

    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon-180x180.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Capital Copilot" />

    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
    />
  </head>

  <body class="mat-typography mat-app-background">
    <!-- Immediately set background based on stored theme preference to prevent flash -->
    <script>
      (function () {
        var theme = localStorage.getItem('theme');
        var isLight = theme === 'light';
        document.body.style.backgroundColor = isLight ? '#fdfcff' : '#121212';
      })();
    </script>
    <app-root>
      <!-- Loading screen shown while Angular app is bootstrapping -->
      <style>
        .app-loading {
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          background: #121212;
          z-index: 9999;
        }
        .app-loading img {
          width: 13%;
          height: auto;
        }
        .app-loading-text {
          margin-top: 24px;
          font-family: 'Roboto', sans-serif;
          font-size: 14px;
          color: #888;
          letter-spacing: 0.5px;
        }
        /* Light theme from localStorage */
        body.theme-light .app-loading {
          background: #fdfcff;
        }
        body.theme-light .app-loading img {
          filter: invert(0.5);
        }
        body.theme-light .app-loading-text {
          color: #666;
        }
      </style>
      <script>
        // Apply theme class to body for loading screen styling
        (function () {
          var theme = localStorage.getItem('theme');
          if (theme === 'light') {
            document.body.classList.add('theme-light');
          }
        })();
      </script>
      <div class="app-loading">
        <img src="logo.loading.min.svg" alt="Capital Copilot Logo" />
        <div class="app-loading-text">Loading...</div>
        <div class="app-loading-text">If you are stuck here, try SHIFT + Click on Refresh</div>
      </div>
    </app-root>
  </body>
</html>
