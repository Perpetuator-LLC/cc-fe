<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Capital Copilot</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Default SEO Meta Tags -->
    <meta
      name="description"
      content="Capital Copilot - AI-powered podcast generation and management platform. Create, manage, and distribute podcasts with ease."
    />
    <meta name="author" content="Perpetuator LLC" />
    <meta name="keywords" content="podcast, AI, audio, content creation, podcast management" />

    <!-- Open Graph Meta Tags -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Capital Copilot" />
    <meta property="og:title" content="Capital Copilot - AI-Powered Podcast Platform" />
    <meta
      property="og:description"
      content="Create, manage, and distribute podcasts with AI-powered tools. Discover amazing podcasts from our community."
    />
    <meta property="og:image" content="/Capital_Copilot_Logo_PFP.png" />
    <meta property="og:url" content="https://capitalcopilot.io" />

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@CapitalCopilot" />
    <meta name="twitter:title" content="Capital Copilot - AI-Powered Podcast Platform" />
    <meta
      name="twitter:description"
      content="Create, manage, and distribute podcasts with AI-powered tools. Discover amazing podcasts from our community."
    />
    <meta name="twitter:image" content="/Capital_Copilot_Logo_PFP.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
    />
  </head>

  <body class="mat-typography mat-app-background">
    <app-root>
      <!-- Loading screen shown while Angular app is bootstrapping -->
      <style>
        .app-loading {
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          background: #121212;
          z-index: 9999;
        }
        .app-loading img {
          width: 33%;
          height: auto;
        }
        .app-loading-text {
          margin-top: 24px;
          font-family: 'Roboto', sans-serif;
          font-size: 14px;
          color: #888;
          letter-spacing: 0.5px;
        }
      </style>
      <div class="app-loading">
        <img src="logo.outline_loading.svg" alt="Capital Copilot Logo" />
        <div class="app-loading-text">Loading...</div>
      </div>
    </app-root>
  </body>
</html>
