  <body class="mat-typography mat-app-background">
    <!-- Immediately set background based on stored theme preference to prevent flash -->
    <script>
      (function () {
        var theme = localStorage.getItem('theme');
        var isLight = theme === 'light';
        document.body.style.backgroundColor = isLight ? '#fdfcff' : '#121212';
      })();
    </script>

    <!-- Detect stale chunk 404 errors and auto-refresh -->
    <script>
      (function () {
        var chunkErrorCount = 0;
        var hasRefreshed = false;

        // Listen for script/css load errors (404s)
        window.addEventListener(
          'error',
          function (e) {
            // Check if it's a script or link element that failed to load
            var target = e.target;
            if (target && (target.tagName === 'SCRIPT' || target.tagName === 'LINK')) {
              var src = target.src || target.href || '';
              // Check if it's one of our chunks or main files
              if (src.includes('chunk-') || src.includes('main-') || src.includes('styles-')) {
                chunkErrorCount++;
                console.warn('[ChunkLoader] Failed to load:', src);

                // If we've seen multiple chunk errors, it's likely a stale cache issue
                if (chunkErrorCount >= 2 && !hasRefreshed) {
                  var lastRefresh = sessionStorage.getItem('chunk-refresh-time');
                  var now = Date.now();

                  // Only refresh if we haven't tried in the last 10 seconds
                  if (!lastRefresh || now - parseInt(lastRefresh, 10) > 10000) {
                    hasRefreshed = true;
                    sessionStorage.setItem('chunk-refresh-time', now.toString());
                    console.warn('[ChunkLoader] Stale chunks detected, refreshing...');
                    // Use location.reload(true) to bypass cache
                    window.location.reload(true);
                  }
                }
              }
            }
          },
          true,
        ); // Use capture phase to catch errors early
      })();
    </script>

    <app-root>
      <!-- Loading screen shown while Angular app is bootstrapping -->
      <style>
        .app-loading {
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          background: #121212;
          z-index: 9999;
        }
        .app-loading img {
          width: 13%;
          height: auto;
        }
        .app-loading-text {
          margin-top: 24px;
          font-family: 'Roboto', sans-serif;
          font-size: 14px;
          color: #888;
          letter-spacing: 0.5px;
        }
        /* Light theme from localStorage */
        body.theme-light .app-loading {
          background: #fdfcff;
        }
        body.theme-light .app-loading img {
          filter: invert(0.5);
        }
        body.theme-light .app-loading-text {
          color: #666;
        }
      </style>
      <script>
        // Apply theme class to body for loading screen styling
        (function () {
          var theme = localStorage.getItem('theme');
          if (theme === 'light') {
            document.body.classList.add('theme-light');
          }

          // If app hasn't loaded in 15 seconds, show a more helpful message
          setTimeout(function () {
            var loadingText = document.querySelector('.app-loading-text');
            if (loadingText && document.querySelector('.app-loading')) {
              loadingText.innerHTML =
                'Taking longer than expected...<br>Try pressing Ctrl+Shift+R (Cmd+Shift+R on Mac) to hard refresh.';
            }
          }, 15000);
        })();
      </script>
      <div class="app-loading">
        <img src="logo.loading.min.svg" alt="Capital Copilot Logo" />
        <div class="app-loading-text">Loading...</div>
        <div class="app-loading-text app-loading-hint" style="font-size: 12px; margin-top: 8px; opacity: 0.7">
          If stuck, press Ctrl+Shift+R (Cmd+Shift+R on Mac)
        </div>
      </div>
    </app-root>
  </body>
</html>
