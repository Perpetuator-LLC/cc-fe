<button mat-flat-button class="action-button" color="primary" [disabled]="disabled || loading" (click)="onClick()">
  <span class="button-content">
    @if (loading) {
      <mat-spinner diameter="18" />
    } @else {
      <mat-icon>{{ icon }}</mat-icon>
    }
    <ng-content />
  </span>
</button>
