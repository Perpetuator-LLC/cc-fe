<div class="voice-dropdown-container">
  <mat-form-field appearance="outline" class="full-width">
    <mat-label>{{ label }}</mat-label>
    @if (loadingVoices) {
      <mat-select disabled>
        <mat-option>Loading voices...</mat-option>
      </mat-select>
    } @else {
      <mat-select [value]="selectedVoiceUuid" (selectionChange)="onSelectionChange($event.value)">
        <!-- Custom trigger shows only voice name -->
        <mat-select-trigger>
          {{ getSelectedVoiceName() }}
        </mat-select-trigger>
        @for (voice of voices; track voice.uuid) {
          <mat-option [value]="voice.uuid">
            <div class="voice-option">
              <span class="voice-name">{{ getDisplayName(voice) }}</span>
              <span class="voice-tier-chip">{{ getTierLabel(voice) }}</span>
              @if (voice.sampleUrl) {
                <button
                  mat-icon-button
                  type="button"
                  (mouseenter)="playPreviewOnHover(voice)"
                  (mouseleave)="stopPreview()"
                  (click)="$event.stopPropagation()"
                  [matTooltip]="isPlaying(voice) ? 'Playing...' : 'Preview voice'"
                >
                  @if (isPlaying(voice)) {
                    <mat-icon>volume_up</mat-icon>
                  } @else {
                    <mat-icon>play_circle</mat-icon>
                  }
                </button>
              }
            </div>
          </mat-option>
        }
      </mat-select>
    }
    @if (hint) {
      <mat-hint>{{ hint }}</mat-hint>
    }
  </mat-form-field>

  <!-- Hidden audio player for previews -->
  <audio #audioPlayer (ended)="onAudioEnded()"></audio>
</div>
