<div class="before-select-podcast">
  <div class="news-before-container">
    <h3>Pick a Podcast to Start Generating Fresh News</h3>
    <p>
      Get the latest headlines and insights auto-matched to your podcast. Ready to turn today's news into a fresh
      episode?
    </p>
    <div class="before-select-right-podcasts">
      <div class="fields">
        <app-labeled-select
          class="podcast-select-field"
          label="Select Podcast"
          [options]="podcastOptions"
          [value]="selectedPodcastUuid"
          [loading]="loadingPodcasts"
          loadingText="Loading podcasts..."
          (valueChange)="onPodcastValueChange($event)"
        />
        <app-labeled-select
          class="time-select-field"
          label="Time"
          [options]="timeOptions"
          [value]="selectedHours"
          (valueChange)="onHoursValueChange($event)"
        />
      </div>
      <button mat-flat-button color="primary" type="button" (click)="onFetchClick()" [disabled]="fetchDisabled">
        Fetch News
      </button>
    </div>
  </div>
</div>
