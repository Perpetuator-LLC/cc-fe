<ng-template #toolbarTemplate>
  <span class="page-title"
    ><mat-icon>groups</mat-icon>My Teams <span>></span> <span class="page-title-secondary">Team List</span></span
  >
</ng-template>
<app-message></app-message>
@if (loading) {
  <div class="loading-spinner">
    <mat-progress-bar value="20" style="height: 2px" mode="indeterminate"></mat-progress-bar>
  </div>
} @else if (teams.length === 0) {
  <h2>No teams found.</h2>
} @else {
  <mat-card class="create-team-card">
    <mat-card-content class="content-header">
      <div class="title">
        <h3>All Teams</h3>
        <span>{{ teams.length }} teams</span>
      </div>
      <button mat-flat-button color="primary" type="button" (click)="createTeam()">+ Create Team</button>
    </mat-card-content>
  </mat-card>

  <div class="middle-card">
    <div class="table-controls">
      <div class="search-filter">
        <div class="input-search-div">
          <mat-icon matPrefix>search</mat-icon>
          <input matInput placeholder="Search by team name" />
        </div>
        <button mat-flat-button class="filter-button">
          <mat-icon>filter_list</mat-icon>
          Filter
        </button>
      </div>
      <div class="view-toggles">
        <!-- Remove Manage Column button and menu -->
      </div>
    </div>
    <div class="teams-container">
      <table mat-table [dataSource]="dataSource" matSort>
        <!-- Name Column -->
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Team Name</th>
          <td mat-cell *matCellDef="let team">
            <div class="t_name">
              <div class="name">
                <a [routerLink]="['/team', team.uuid]" class="team-name-link">
                  {{ team.name }}
                </a>
              </div>
            </div>
          </td>
        </ng-container>

        <!-- Members Column -->
        <ng-container matColumnDef="members">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Members</th>
          <td mat-cell *matCellDef="let team">{{ team.members.length }} members</td>
        </ng-container>

        <!-- Podcasts Column -->
        <ng-container matColumnDef="podcast">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Podcasts</th>
          <td mat-cell *matCellDef="let team">{{ team.podcast?.length || 0 }} podcasts</td>
        </ng-container>

        <!-- Actions Column -->
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef></th>

          <td mat-cell *matCellDef="let team" style="text-align: right">
            <button class="action-btn" mat-icon-button [matMenuTriggerFor]="teamActionsMenu" aria-label="Team actions">
              <mat-icon>more_vert</mat-icon>
            </button>
            <mat-menu #teamActionsMenu="matMenu" class="actionMenu">
              <button mat-menu-item (click)="viewTeam(team.uuid)">
                <app-svg-icon icon="edit"></app-svg-icon>
                <span>Edit</span>
              </button>
            </mat-menu>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>
      <mat-paginator
        [pageSize]="pageSize"
        [pageSizeOptions]="pageSizeOptions"
        showFirstLastButtons
        aria-label="Select page of teams"
      >
      </mat-paginator>
    </div>
  </div>
}
