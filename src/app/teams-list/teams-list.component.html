<ng-template #toolbarTemplate>
  <span>My Teams</span>
</ng-template>
<app-message></app-message>
<mat-card>
  <mat-card-content>
    <button mat-flat-button color="primary" type="button" (click)="createTeam()">Create Team</button>
  </mat-card-content>
</mat-card>
@if (loading) {
  <div class="loading-spinner">
    <mat-progress-spinner mode="indeterminate"></mat-progress-spinner>
  </div>
} @else if (teams.length === 0) {
  <h2>No teams found.</h2>
} @else {
  <div class="teams-container">
    @for (team of teams; track team.id) {
      <mat-card class="team-card">
        <mat-card-header>
          <mat-card-title>{{ team.name }}</mat-card-title>
        </mat-card-header>
        <mat-card-actions>
          <button mat-button color="primary" (click)="viewTeam(team.id)">
            <mat-icon aria-label="View team details">group</mat-icon>
            View Details
          </button>
        </mat-card-actions>
      </mat-card>
    }
  </div>
}
