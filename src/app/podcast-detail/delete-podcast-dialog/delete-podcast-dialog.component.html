<div class="delete-dialog">
    <h2 mat-dialog-title>Delete {{ podcastName }}</h2>
    <mat-dialog-content>
        <div class="danger-zone">
            <p>Are you sure you want to delete this podcast? This action is irreversible.</p>
            <div class="action-row">
                <mat-form-field appearance="fill" style="width:100%">
                    <mat-label>Delete Confirmation</mat-label>
                    <input matInput [placeholder]="'Type podcast name \'' + podcastName + '\' to confirm'"
                        [(ngModel)]="deleteConfirmation" name="deleteConfirmation" />
                </mat-form-field>
            </div>
        </div>
    </mat-dialog-content>
    <mat-dialog-actions align="end">
        <button class="cancel-btn" mat-button (click)="onCancel()">Cancel</button>
        <button class="delete-btn" mat-flat-button color="warn" (click)="onDelete()"
            [disabled]="deleteConfirmation !== podcastName">
            Delete Podcast
        </button>
    </mat-dialog-actions>
</div>
