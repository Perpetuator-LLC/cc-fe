<ng-template #toolbarTemplate>
  <span class="page-title">
    <mat-icon>vital_signs</mat-icon>My Pulses <span>></span>
    <span class="page-title-secondary">{{ pulseConfig?.name || 'Loading...' }}</span>
  </span>
</ng-template>

@if (loading) {
  <div class="loading-container">
    <mat-spinner diameter="48" />
  </div>
} @else if (pulseConfig) {
  <div class="pulse-detail">
    <app-pulse-detail-header
      [pulseConfig]="pulseConfig"
      [generatingPulse]="generatingPulse"
      (generatePulse)="generatePulse()"
      (deletePulseConfig)="deletePulseConfig()"
    />

    @if (latestPulse) {
      <app-latest-pulse-card
        [pulse]="latestPulse"
        [showTranscript]="showTranscript"
        (playPulse)="playPulse($event)"
        (queueNext)="addToQueueNext($event)"
        (queue)="addToQueue($event)"
        (toggleTranscript)="toggleTranscript()"
      />
    }

    <mat-tab-group [(selectedIndex)]="selectedTabIndex" (selectedIndexChange)="onTabChange($event)" dynamicHeight>
      <mat-tab label="Settings">
        <app-pulse-settings-tab
          [pulseForm]="pulseForm"
          [toneOptions]="toneOptions"
          [targetDurationMinutes]="pulseForm.controls['targetDurationMinutes'].value"
          [wordsPerMinute]="pulseConfig.wordsPerMinute"
          [loadingPreferences]="loadingPreferences"
          [phoneVerified]="phoneVerified"
        />
      </mat-tab>

      <mat-tab label="Content Sources">
        <app-pulse-content-sources-tab
          [contentSources]="contentSources"
          [allSymbols]="allSymbols"
          [contentSourceColumns]="contentSourceColumns"
          (addBulkRssFeeds)="addBulkRssFeeds()"
          (addContentSource)="addContentSource()"
          (editContentSource)="editContentSource($event)"
          (removeContentSource)="removeContentSource($event)"
        />
      </mat-tab>

      <mat-tab label="Alerts">
        <app-pulse-alert-triggers-tab
          [alertTriggers]="alertTriggers"
          [alertTriggerColumns]="alertTriggerColumns"
          (addAlertTrigger)="addAlertTrigger()"
          (removeAlertTrigger)="removeAlertTrigger($event)"
        />
      </mat-tab>

      <mat-tab label="Voice">
        <app-pulse-voice-tab
          [selectedVoiceUuid]="pulseConfig.voice?.uuid ?? null"
          (voiceSelected)="onVoiceSelected($event)"
        />
      </mat-tab>

      <mat-tab label="Schedule">
        <div class="tab-content">
          <app-schedule-list context="pulse" [pulseConfigUuid]="pulseConfig.uuid" />
        </div>
      </mat-tab>

      <mat-tab label="Recordings">
        <app-pulse-recordings-tab
          [pulses]="pulses"
          (createRecording)="createRecording()"
          (viewRecording)="viewRecording($event)"
          (playPulse)="playPulse($event)"
          (queueNext)="addToQueueNext($event)"
          (queue)="addToQueue($event)"
        />
      </mat-tab>
    </mat-tab-group>
  </div>
}
