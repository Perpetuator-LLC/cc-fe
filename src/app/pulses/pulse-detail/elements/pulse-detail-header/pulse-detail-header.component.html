<mat-card class="pulse-header-card">
  <mat-card-content>
    <div class="header-content">
      <div class="header-info">
        <div class="pulse-icon">
          <mat-icon>vital_signs</mat-icon>
        </div>
        <div class="header-text">
          <h1>{{ pulseConfig.name }}</h1>
          <p>{{ pulseConfig.description || 'No description' }}</p>
        </div>
      </div>
      <div class="header-actions">
        <app-action-button icon="play_arrow" [loading]="generatingPulse" (actionClick)="generatePulse.emit()">
          Generate Now
        </app-action-button>
        <button mat-icon-button [matMenuTriggerFor]="headerMenu" matTooltip="More actions">
          <mat-icon>more_vert</mat-icon>
        </button>
        <mat-menu #headerMenu="matMenu">
          <button mat-menu-item (click)="deletePulseConfig.emit()">
            <mat-icon color="warn">delete</mat-icon>
            <span>Delete Configuration</span>
          </button>
        </mat-menu>
      </div>
    </div>
  </mat-card-content>
</mat-card>
