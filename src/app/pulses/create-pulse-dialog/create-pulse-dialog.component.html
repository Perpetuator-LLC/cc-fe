<div class="dialog-header" mat-dialog-title>
  <h2>Generate Pulse</h2>
  <button mat-icon-button (click)="dialogRef.close()">
    <mat-icon>close</mat-icon>
  </button>
</div>
<mat-dialog-content>
  <form [formGroup]="pulseForm" (ngSubmit)="onSubmit()">
    <mat-form-field>
      <mat-label>Description (Required)</mat-label>
      <textarea
        matInput
        formControlName="description"
        required
        rows="4"
        placeholder="Describe your ideal audio news feed... (e.g., 'A morning market brief covering AI and tech news, focusing on NVIDIA and semiconductor stocks.')"
      ></textarea>
      @if (descriptionError) {
        <mat-error>{{ descriptionError }}</mat-error>
      }
    </mat-form-field>

    <mat-form-field>
      <mat-label>Title (Optional)</mat-label>
      <input matInput formControlName="title" placeholder="Leave blank to auto-generate from description" />
      @if (titleError) {
        <mat-error>{{ titleError }}</mat-error>
      }
    </mat-form-field>

    <div class="notification-section">
      <h3>Notifications</h3>
      <div class="notification-option">
        <mat-checkbox
          formControlName="smsNotificationEnabled"
          [matTooltip]="
            !phoneVerified
              ? 'Verify your phone number in Settings to enable SMS notifications'
              : 'Receive an SMS when your pulse is ready'
          "
        >
          Notify me via SMS when ready
        </mat-checkbox>
        @if (!loadingPreferences && !phoneVerified) {
          <a routerLink="/user" class="verify-link" (click)="dialogRef.close()">
            <mat-icon>phone</mat-icon>
            Verify phone number
          </a>
        }
        @if (loadingPreferences) {
          <mat-spinner diameter="16" />
        }
      </div>
    </div>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button class="cancel-btn" mat-button (click)="dialogRef.close()">Cancel</button>
  <button
    class="generate-btn"
    mat-flat-button
    color="primary"
    (click)="onSubmit()"
    [disabled]="!pulseForm.valid || isSubmitting"
  >
    @if (isSubmitting) {
      <mat-spinner diameter="20" />
    } @else {
      Generate Pulse
    }
  </button>
</mat-dialog-actions>
