<ng-template #toolbarTemplate>
  <span>My Podcasts</span>
</ng-template>
<app-message></app-message>
<mat-card>
  <mat-card-content>
    <button mat-flat-button color="primary" type="button" (click)="createPodcast()">Create Podcast</button>
  </mat-card-content>
</mat-card>
@if (loading) {
  <div class="loading-spinner">
    <mat-progress-spinner mode="indeterminate"></mat-progress-spinner>
  </div>
} @else if (podcasts.length === 0) {
  <h2>No podcasts found.</h2>
} @else {
  <div class="podcasts-container">
    @for (podcast of podcasts; track podcast.uuid) {
      <mat-card class="podcast-card">
        <mat-card-header>
          <mat-card-title>{{ podcast.name }}</mat-card-title>
        </mat-card-header>
        <mat-card-actions>
          <button mat-button color="primary" (click)="viewPodcast(podcast.uuid)">
            <mat-icon aria-label="View podcast details">video_settings</mat-icon>
            View Details
          </button>
        </mat-card-actions>
      </mat-card>
    }
  </div>
}
