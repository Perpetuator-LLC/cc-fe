<ng-template #toolbarTemplate />
<!--<app-message></app-message>-->
<link rel="stylesheet" href="forgot-password.component.scss" />
<div class="forgot-container">
  <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()">
    <mat-card class="forgot-card">
      <mat-card-header>
        <mat-card-title>Password Recovery</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <mat-form-field appearance="fill">
          <mat-label>Email</mat-label>
          <input matInput type="text" id="email" formControlName="email" autocomplete="email" />
          @if (forgotForm.controls.email.errors?.['required']) {
            <mat-error>Email is required</mat-error>
          }
          @if (forgotForm.controls.email.errors?.['email']) {
            <mat-error>Enter a valid email</mat-error>
          }
        </mat-form-field>
      </mat-card-content>
      <mat-card-actions>
        <button
          class="login-btn"
          mat-raised-button
          color="primary"
          type="submit"
          [disabled]="!forgotForm.valid || isLoading"
        >
          @if (isLoading) {
            <mat-spinner diameter="20" class="inline-spinner" />
            Sending recovery email...
          } @else {
            Send recovery email
          }
        </button>
      </mat-card-actions>
    </mat-card>
  </form>
</div>
