<div class="pre-login-layout">
  <div class="header">
    <a [routerLink]="['/home']" class="mat-link website-logo" routerLinkActive="active-link">
      <img
        src="/Capital_Copilot_Logo_Slanted.svg"
        aria-label="Side nav toggle icon"
        alt="Capital Copilot"
        matTooltip="Capital Copilot"
        width="48"
        height="48"
      />
      <div class="route-title">
        <span class="website-title">Capital<br />
        <span class="website-title-copilot">&nbsp;&nbsp;Copitol</span>
        </span>
      </div>
    </a>

    <div class="header-actions">
      <a mat-button [routerLink]="['/register']" class="auth-link register-link btn-surface">
        <mat-icon>person_add</mat-icon>
        <span>Register</span>
      </a>

      <a mat-stroked-button [routerLink]="['/login']" class="auth-link login-link btn-secondary-outlined">
        <mat-icon>login</mat-icon>
        <span>Sign In</span>
      </a>

      <button
        mat-icon-button
        class="theme-toggle"
        (click)="switchTheme(currentTheme() === 'dark' ? 'light' : 'dark')"
        [matTooltip]="currentTheme() === 'dark' ? 'Switch to Light Mode' : 'Switch to Dark Mode'"
      >
        <mat-icon>{{ currentTheme() === 'dark' ? 'light_mode' : 'dark_mode' }}</mat-icon>
      </button>
    </div>
  </div>

  <div class="content-area" [class.with-footer]="true" [class.is-home-page]="isHomePage">
    <div class="content-wrapper">
      <router-outlet />
    </div>
    <app-shared-footer [compactMode]="!isHomePage" />
  </div>
</div>
