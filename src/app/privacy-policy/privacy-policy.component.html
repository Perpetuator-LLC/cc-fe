<ng-template #toolbarTemplate>
  @if (authService.isLoggedIn()) {
    <h1>Privacy Policy</h1>
  } @else {
    <p><a href="/register">Sign up</a> or <a href="/login">Login</a></p>
  }
</ng-template>
<mat-card class="privacy-policy">
  <mat-card-content>
    <iframe src="https://app.termly.io/policy-viewer/policy.html?policyUUID=b90c5933-5499-4082-95d9-840a4a9fb0c5"></iframe>
  </mat-card-content>
</mat-card>
