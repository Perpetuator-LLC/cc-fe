<mat-card class="podcast-card">
  <a [routerLink]="['/media/podcasts', podcast.uuid]" class="podcast-link">
    @if (podcast.thumbnailUrl) {
      <img [src]="podcast.thumbnailUrl" alt="{{ podcast.name }}" class="podcast-image" />
    } @else {
      <div class="podcast-placeholder">
        <mat-icon>podcasts</mat-icon>
      </div>
    }
  </a>
  <mat-card-content>
    <div class="status-badge" [class.enabled]="podcast.enabled" [class.disabled]="!podcast.enabled">
      {{ podcast.enabled ? 'Enabled' : 'Disabled' }}
    </div>
    <h3>
      <a [routerLink]="['/media/podcasts', podcast.uuid]">{{ podcast.name }}</a>
    </h3>
    @if (podcast.team && podcast.team.name) {
      <p class="team">Team: {{ podcast.team.name }}</p>
    } @else {
      <p class="team placeholder">(No Team)</p>
    }
    <div class="stats">
      <span class="stat">
        <mat-icon>schedule</mat-icon>
        {{ podcast.formattedTimeAgo }}
      </span>
      <span class="stat">
        <mat-icon>visibility</mat-icon>
        {{ podcast.formattedViewCount }}
      </span>
    </div>
  </mat-card-content>
</mat-card>
