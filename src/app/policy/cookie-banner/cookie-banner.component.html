<mat-card-footer>
  @if (showBanner()) {
    <div class="cookie-banner mat-elevation-z4">
      <span class="cookie-text">
        We use only essential cookies required for our site to function properly, such as keeping you logged in. We do
        not use tracking, analytics, or advertising cookies. For more details, see our
        <a routerLink="/cookie-policy" class="privacy-link">Cookie Policy</a>.
      </span>
      <div class="cookie-buttons">
        <button mat-raised-button color="primary" (click)="acceptCookies()">Got it</button>
      </div>
    </div>
  }
</mat-card-footer>
