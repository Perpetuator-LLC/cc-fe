<mat-form-field>
  <mat-label>User</mat-label>
  <input type="text" matInput [formControl]="searchControl" [matAutocomplete]="auto" autocomplete="user" />
  <mat-autocomplete
    #auto="matAutocomplete"
    (optionSelected)="onOptionSelected($event.option.value)"
    [displayWith]="displayFn"
    autoActiveFirstOption
  >
    @for (user of filteredUsers$ | async; track user.id) {
      <mat-option [value]="user">{{ user.username }}</mat-option>
    }
  </mat-autocomplete>
</mat-form-field>
