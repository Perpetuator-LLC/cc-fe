<div class="delete-dialog">
  <h2 mat-dialog-title>Permanently remove your account</h2>
  <mat-dialog-content>
    <div class="danger-zone">
      <p>
        This action <strong>cannot be undone</strong>. This will permanently delete your account, all your data, and
        remove you from any teams or podcasts you are a member of.
      </p>
      <p>
        Please type your email address <strong>{{ email }}</strong> to confirm.
      </p>
      <div class="action-row">
        <mat-form-field appearance="fill">
          <mat-label>Delete Confirmation</mat-label>
          <input matInput [placeholder]="placeholderText" [(ngModel)]="deleteConfirmation" />
        </mat-form-field>
      </div>
    </div>
  </mat-dialog-content>
  <mat-dialog-actions align="end">
    <button class="cancel-btn" mat-button (click)="onCancel()">Cancel</button>
    <button
      class="delete-btn"
      mat-flat-button
      color="warn"
      (click)="onDelete()"
      [disabled]="deleteConfirmation !== email"
    >
      Delete Account
    </button>
  </mat-dialog-actions>
</div>
