<ng-template #toolbarTemplate>
  <div class="toolbar-container">
    <h1>Jobs</h1>
  </div>
</ng-template>

@if (jobs.length > 0) {
  <div class="jobs-container">
    <table
      mat-table
      [dataSource]="dataSource"
      matSort
      matSortActive="createdAt"
      matSortDirection="desc"
      matSortDisableClear
    >
      <!-- Type Column -->
      <ng-container matColumnDef="jobType">
        <th mat-header-cell *matHeaderCellDef>Type</th>
        <td mat-cell *matCellDef="let job">{{ jobTypeToString(job.jobType) }}</td>
      </ng-container>

      <!-- Status Column -->
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let job">{{ job.status.toUpperCase() }}</td>
      </ng-container>

      <!-- Message Column -->
      <ng-container matColumnDef="message">
        <th mat-header-cell *matHeaderCellDef>Message</th>
        <td mat-cell *matCellDef="let job">{{ job.error || job.result }}</td>
      </ng-container>

      <!-- Created At Column -->
      <ng-container matColumnDef="createdAt">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Created At</th>
        <td mat-cell *matCellDef="let job">{{ job.createdAt | date: 'short' }}</td>
      </ng-container>

      <!-- Updated At Column -->
      <ng-container matColumnDef="updatedAt">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Updated At</th>
        <td mat-cell *matCellDef="let job">{{ job.updatedAt | date: 'short' }}</td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns" matTooltip="ID: {{ row.id }}"></tr>
    </table>

    <mat-paginator
      [length]="totalJobs"
      [pageSize]="pageSize"
      [pageSizeOptions]="[5, 10, 20]"
      (page)="onPageChange($event)"
    >
    </mat-paginator>
  </div>
}
