<div class="share-buttons" [class.compact]="compact">
  @if (canNativeShare && !compact) {
    <button mat-raised-button (click)="shareNative()" class="share-button native-share">
      <mat-icon>share</mat-icon>
      Share
    </button>
  }

  <button mat-icon-button [matMenuTriggerFor]="shareMenu" [matTooltip]="compact ? 'Share' : ''" class="share-menu-button">
    <mat-icon>more_horiz</mat-icon>
  </button>

  <mat-menu #shareMenu="matMenu" class="share-menu">
    <button mat-menu-item (click)="shareToTwitter()">
      <mat-icon>
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
        </svg>
      </mat-icon>
      <span>Share to X (Twitter)</span>
    </button>

    <button mat-menu-item (click)="shareToFacebook()">
      <mat-icon>
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
        </svg>
      </mat-icon>
      <span>Share to Facebook</span>
    </button>

    <mat-divider></mat-divider>

    <button mat-menu-item (click)="copyLink()">
      <mat-icon>content_copy</mat-icon>
      <span>Copy Link</span>
    </button>
  </mat-menu>
</div>
