<div class="settings-section" [formGroup]="podcastForm">
  <h3 class="section-title">Podcast Image</h3>

  <div class="member-row mb-lg">
    <div
      class="file-input-wrapper"
      [class.dragging]="isDragging"
      (dragover)="dragOver.emit($event)"
      (dragleave)="dragLeave.emit($event)"
      (drop)="fileDrop.emit($event)"
    >
      <div class="image-preview">
        @if (hasImage) {
          <img
            [src]="displayImageUrl"
            alt="Podcast Image"
            class="podcast-image-thumbnail icon-clickable"
            loading="lazy"
            (click)="viewFullImage.emit()"
            (keydown.enter)="viewFullImage.emit()"
            tabindex="0"
            role="button"
            matTooltip="Click to view full size"
          />
        } @else {
          <div class="image-placeholder">
            <mat-icon>image</mat-icon>
            <p>No image uploaded</p>
          </div>
        }
      </div>

      @if (uploading) {
        <div class="upload-progress upload-btn">
          <mat-spinner diameter="20" />
          <span>Uploading: {{ selectedFileName }}</span>
        </div>
      } @else {
        <div class="upload-area">
          <button class="upload-btn" mat-flat-button color="primary" type="button" (click)="fileInput.click()">
            <svg width="13" height="14" viewBox="0 0 13 14" fill="none" xmlns="http://www.w3.org/2000/svg">
              <g clip-path="url(#clip0_210_6192)">
                <path
                  d="M5.6875 7.8125H7.3125V4.5625H9.75L6.5 1.3125L3.25 4.5625H5.6875V7.8125ZM8.125 5.98438V7.23725L11.8454 8.625L6.5 10.6181L1.15456 8.625L4.875 7.23725V5.98438L0 7.8125V11.0625L6.5 13.5L13 11.0625V7.8125L8.125 5.98438Z"
                  fill="currentColor"
                />
              </g>
              <defs>
                <clipPath id="clip0_210_6192">
                  <rect width="13" height="13" fill="white" transform="translate(0 0.5)" />
                </clipPath>
              </defs>
            </svg>
            Upload Podcast Featured Image
          </button>
          <span class="desc">Drag & drop or click to upload image (JPEG, PNG, WEBP, GIF, max 5MB)</span>
        </div>
      }

      <!-- md3-ignore: file input -->
      <input
        #fileInput
        type="file"
        formControlName="image"
        (change)="fileSelected.emit($event)"
        accept="image/jpeg,image/png,image/webp,image/gif"
        hidden
      />
    </div>

    <div class="image-actions">
      <button
        mat-icon-button
        color="primary"
        type="button"
        (click)="regenerate.emit()"
        [disabled]="generating"
        matTooltip="Regenerate cover image using AI"
      >
        @if (generating) {
          <mat-spinner diameter="20" />
        } @else {
          <mat-icon>auto_awesome</mat-icon>
        }
      </button>
      <button mat-icon-button type="button" (click)="openHistory.emit()" matTooltip="View image history">
        <mat-icon>history</mat-icon>
      </button>
      @if (hasImage) {
        <button mat-icon-button color="warn" type="button" (click)="deleteImage.emit()" matTooltip="Delete image">
          <mat-icon>delete</mat-icon>
        </button>
      }
    </div>
  </div>
</div>
