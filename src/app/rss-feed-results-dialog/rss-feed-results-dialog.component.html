<h2 mat-dialog-title>RSS Feed Import Results</h2>
<mat-dialog-content>
  <div style="margin-bottom: 20px;" *ngIf="data.successful.length > 0">
    <mat-form-field appearance="fill" style="width: 100%">
      <mat-label>Successfully Added ({{ data.successful.length }})</mat-label>
      <textarea matInput [value]="getSuccessfulText()" rows="6" readonly style="font-family: monospace; font-size: 12px;"></textarea>
    </mat-form-field>
  </div>

  <div *ngIf="data.failed.length > 0">
    <mat-form-field appearance="fill" style="width: 100%">
      <mat-label>Failed ({{ data.failed.length }})</mat-label>
      <textarea matInput [value]="getFailedText()" rows="6" readonly style="font-family: monospace; font-size: 12px; color: #d32f2f;"></textarea>
    </mat-form-field>
  </div>

  <div *ngIf="data.successful.length === 0 && data.failed.length === 0" style="padding: 20px; text-align: center;">
    No results to display.
  </div>
</mat-dialog-content>
<mat-dialog-actions>
  <button mat-raised-button color="primary" (click)="onClose()">Close</button>
</mat-dialog-actions>
