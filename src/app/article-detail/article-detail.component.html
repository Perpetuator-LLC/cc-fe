<ng-template #toolbarTemplate>
  <h1>Crypto Article Details</h1>
</ng-template>
<app-message></app-message>
<mat-card>
  <mat-card-content class="form-container">
    @if (audioSrc) {
      <button mat-raised-button color="primary" class="article-control" (click)="publishAudio()">Publish</button>
      <audio controls [src]="audioSrc"></audio>
    }
    <button mat-raised-button color="primary" class="article-control" (click)="updateArticle()">Update</button>
    <button mat-raised-button color="primary" class="article-control" (click)="generateAudio()">Generate Audio</button>
    @if (downloadLink) {
      <button mat-raised-button color="primary" class="article-control" (click)="downloadAudio()">Download MP3</button>
    }
    <mat-form-field class="full-width article-content">
      <mat-label>Title</mat-label>
      <input matInput [(ngModel)]="updatedTitle" />
    </mat-form-field>
    <mat-form-field class="full-width article-content">
      <mat-label>Content</mat-label>
      <textarea matInput [(ngModel)]="updatedContent"></textarea>
    </mat-form-field>

    Generated on:
    <span [matTooltip]="article.date | date: 'z'" matTooltipPosition="above">
      {{ article.date | date: 'short' : 'local' }}
    </span>
    <br />
    <br />

    <mat-divider></mat-divider>

    <h3>Related Articles</h3>
    <mat-list>
      @for (relatedArticle of linkedArticles; track relatedArticle.id) {
        <mat-list-item>
          <a matLine href="{{ relatedArticle.url }}" target="_blank">
            {{ relatedArticle.title }}
          </a>
        </mat-list-item>
      }
    </mat-list>
  </mat-card-content>
</mat-card>
