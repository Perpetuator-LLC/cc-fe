Login with username/email and password.

PUBLIC: Anyone can login (no authentication required).
"""
type Login {
  success: Boolean
  message: String
  tokens: TokenType
  user: UserType
}

"""
Logout by revoking refresh token.

This invalidates the refresh token so it cannot be used to get new access tokens.
The current access token will still work until it expires (1 hour).

PUBLIC: Anyone can logout with their refresh token.
"""
type Logout {
  success: Boolean
  message: String
}

"""
Request a password reset email.

PUBLIC: Anyone can request password reset (no authentication required).
"""
type RequestPasswordReset {
  success: Boolean
  message: String
}

"""
Reset password with token.

PUBLIC: Anyone can reset password with valid token (no authentication required).
"""
type ResetPassword {
  success: Boolean
  message: String
}

"""
Refresh access token using refresh token.

PUBLIC: Anyone can refresh token (no authentication required, token itself is the auth).
"""
type RefreshAccessToken {
  success: Boolean
  message: String
  tokens: TokenType
}