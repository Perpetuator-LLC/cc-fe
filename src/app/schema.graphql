  userSettings(keys: [String]!): UserSettingsType
  users(query: String!): UserList
  userCookieConsents: [UserCookieConsentType]
  emailChangePending: EmailChangeRequestType
  episodes(episodeId: ID, podcastId: ID, page: Int, pageSize: Int, orderBy: String = "date", direction: SortDirection = ASC): PaginatedEpisodes
  news(podcastId: ID!, hours: Int = 24): NewsData
  jobs(jobIds: [UUID], jobStatuses: [String], jobTypes: [String], page: Int = 1, pageSize: Int = 10, orderBy: String = "updatedAt", direction: SortDirection = ASC): PaginatedJobStatus
  podcasts(podcastId: ID, teamId: UUID): [PodcastType!]
