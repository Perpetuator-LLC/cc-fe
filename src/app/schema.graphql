"""A permission definition"""
type PermissionDefinitionType {
  """Permission code (e.g., 'api.add_voice')"""
  code: String!

  """Human-readable name"""
  name: String!

  """Category of permission"""
  permissionType: PermissionTypeEnum!

  """What this permission allows"""
  description: String!

  """Operations that require this permission"""
  requiredFor: [String]
}

"""Permission category types"""
enum PermissionTypeEnum {
  DJANGO_MODEL
  TEAM_ROLE
  API_SCOPE
  CUSTOM
}

"""All permissions a user has"""
type UserPermissionsType {
  """Django model permissions"""
  djangoPermissions: [String]

