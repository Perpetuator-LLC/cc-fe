  PUBLIC: Anyone can request password reset (no authentication required).
  """
  requestPasswordReset(email: String!): RequestPasswordReset

  """
  Reset password with token.
  
  PUBLIC: Anyone can reset password with valid token (no authentication required).
  """
  resetPassword(password1: String!, password2: String!, token: String!): ResetPassword

  """
  Refresh access token using refresh token.
  
  PUBLIC: Anyone can refresh token (no authentication required, token itself is the auth).
  """
  refreshToken(refresh: String!): RefreshAccessToken
