type PaginatedJobStatus {
  success: Boolean
  message: String
  totalRecords: Int
  totalPages: Int
  currentPage: Int
  hasNext: Boolean
  hasPrevious: Boolean
  jobs: [JobData]
}

type JobData {
  id: UUID
  jobType: String
  args: JSONString
  status: String
  error: String
  result: String
  createdAt: DateTime
  updatedAt: DateTime
}

"""
Leverages the internal Python implementation of UUID (uuid.UUID) to provide native UUID objects
in fields, resolvers and input.
"""
scalar UUID

"""
Allows use of a JSON String for input / output from the GraphQL schema.

Use of this type is *not recommended* as you lose the benefits of having a defined, static
schema (one of the key benefits of GraphQL).
"""
scalar JSONString

type Mutation {
  fetchCryptoNewsData: SubmitJobData
  extractCryptoNewsData(ids: [Int]!): SubmitJobData
  summarizeCryptoNewsData(ids: [Int]!, force: Boolean = false): SubmitJobData
  createCryptoArticleData(ids: [Int]!, teamId: ID!): SubmitJobData
  createCryptoArticleChain(newsIds: [ID]!, teamId: ID!): CreateCryptoArticleChain
  updateCryptoArticleData(id: ID!, title: String!, content: String!): CryptoArticleData
  updateCryptoArticleAudio(id: ID!): GraphQLData
  publishCryptoArticleAudio(id: ID!): GraphQLData
  updateUserSetting(key: String!, value: String!): GraphQLData
  retryJobs(ids: [UUID]!): RetryJobs
  updateCookieConsent(accepted: Boolean!, version: String!): UpdateCookieConsent
  updateUserDetails(email: String!, username: String!): UpdateUserDetails
  changePassword(password: String!): ChangePassword
  createTeam(name: String!): CreateTeam
  updateTeam(id: ID!, name: String!): UpdateTeam
  destroyTeam(teamId: ID!): DestroyTeam
  upsertUserToTeam(role: String!, teamId: ID!, userId: ID!): UpsertUserToTeam
  removeUserFromTeam(teamId: ID!, userId: ID!): RemoveUserFromTeam
  resendEmailChange: ResendEmailChange
  cancelEmailChange: CancelEmailChange
  updateSchedule(enabled: Boolean, interval: Int!, name: String!): UpdateScheduleMutation
  createSchedule(args: JSONString, interval: Int!, kwargs: JSONString, name: String!, task: String!): CreateScheduleMutation
}

