type Query {
  getCryptoNewsData(ids: [Int]): CryptoNewsData
  getCryptoArticlesData(orderBy: String = "date", direction: SortDirection = ASC): CryptoArticlesData
  getCryptoArticleData(id: ID!): CryptoArticleData
  getUserSettings(keys: [String]!): UserSettingsData
  getAllUsers: UserList
  getUserCookieConsents: [UserCookieConsentType]
  myTeams: [TeamType]
  team(id: ID!): TeamType
  getUserDetails: UserDetails
  getEmailChangePending: EmailChangeRequestType
  getUserJobs(ids: [UUID], statuses: [String], jobTypes: [String], page: Int, pageSize: Int, orderBy: String, direction: SortDirection): PaginatedJobStatus
}

type CryptoNewsData {
  success: Boolean
  message: String
  results: [CryptoNewsResult]
}

type CryptoNewsResult {
  id: ID
  title: String
  description: String
  url: String
  publishedAt: DateTime
  source: String
  summary: String
  content: String
}

"""
The `DateTime` scalar type represents a DateTime
value as specified by
