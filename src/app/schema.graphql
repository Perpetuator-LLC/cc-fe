type Mutation {
  """Create a new bonus code that can be redeemed for credits."""
  createCode(code: String!, creditAmount: Int!): CreateCode

  """Redeem a bonus code for credits."""
  redeemCode(code: String!): RedeemCode

  """
  Refresh the status of a pending order. This will check the Stripe session status and update the order.
  """
  refreshOrder(orderId: String!): RefreshOrder

  """Cancel a pending order. This will cancel the Stripe session."""
  cancelOrder(orderId: String!): CancelOrder

  """
  Create a new Stripe Checkout session for a user to purchase credits.
  Input amount of 10000 = $100.00 which will be converted to 100,000 credits.
  """
  createStripeCheckoutSession(amount: Int!): CreateStripeCheckoutSession

  """Mutation to update user settings."""
  updateUserSetting(key: String!, value: String!): UpdateUserSetting

  """Mutation to update user cookie consent."""
  updateCookieConsent(accepted: Boolean!, version: String!): UpdateCookieConsent

  """Mutation to update user information."""
  updateUser(email: String!, username: String!): UpdateUser

  """Mutation to delete a user."""
  deleteUser(confirm: String!): DeleteUser

  """Mutation to change user password."""
  changePassword(password: String!): ChangePassword

  """Mutation to resend email change verification link."""
  resendEmailChange: ResendEmailChange

  """Mutation to cancel email change request."""
  cancelEmailChange: CancelEmailChange
  createEpisode(newsIds: [Int]!, podcastId: ID!): CreateEpisode
  createEpisodeChain(newsIds: [ID]!, podcastId: ID!): CreateEpisodeChain
  createEpisodeAudioChain(newsIds: [ID]!, podcastId: ID!): CreateEpisodeAudioChain
  updateEpisode(content: String, episodeId: ID!, isLive: Boolean, title: String): UpdateEpisode
  updateEpisodeAudio(episodeId: ID!): UpdateEpisodeAudio
  publishEpisodeAudio(episodeId: ID!): PublishEpisodeAudio
  fetchNews(podcastId: ID!): FetchNews
  extractNews(newsIds: [ID]!, podcastId: ID!): ExtractNews
  summarizeNews(force: Boolean = false, newsIds: [ID]!, podcastId: ID!): SummarizeNews

  """
  Mutation to delete jobs that are in PENDING or FAILED state. This mutation will check if any of the requested jobs
  are already completed and will not delete them. The mutation returns a message indicating the status of the
  operation and a list of the jobs that were deleted. If any of the requested jobs are not in PENDING or FAILED state,
  they will not be deleted and a message will be returned indicating that those jobs were not deleted.
  """
  deleteJobs(jobIds: [UUID]!): DeleteJobs

  """
  Mutation to retry jobs that are in PENDING or FAILED state. This mutation will set the status of the jobs to
  PENDING, clear the result and error fields, and requeue the jobs for processing. It will also check if any of the
  jobs are already completed and will not restart them. The mutation returns a message indicating the status of the
  operation and a list of the jobs that were restarted.
  """
  retryJobs(jobIds: [UUID]!): RetryJobs

  """
  Create a new podcast. This will create a new podcast and associate it with the team.
  """
  createPodcast(name: String!, teamId: UUID!): CreatePodcast

  """
  Update a podcast. This will update the podcast's name, intro, prompt, outro, and enabled status.
  """
  updatePodcast(description: String, enabled: Boolean, image: Upload, intro: String, name: String, outro: String, ownerEmail: String, ownerLink: String, ownerName: String, podcastId: ID!, prompt: String, refreshTgResponse: Boolean, slug: String, teamId: UUID, tgBotToken: String, tgChannelId: String): UpdatePodcast
  deletePodcast(confirm: String!, podcastId: ID!): DeletePodcast

  """
  Set the RSS feeds for a podcast. These feeds will be used to fetch news articles for summarizing into episodes.
  """
  updatePodcastRssFeeds(podcastId: ID!, rssFeedIds: [ID]!): UpdatePodcastRssFeeds

  """
  Create a new RSS feed. Loads the RSS URL feed and validates it can be parsed.
  """
  createRssFeed(url: String!): CreateRssFeed

  """Mutation to create a new team."""
  createTeam(name: String!): CreateTeam

  """Mutation to delete a team."""
  deleteTeam(confirm: String!, teamId: UUID!): DeleteTeam

  """Mutation to update a team."""
  updateTeam(name: String, teamId: UUID!): UpdateTeam

  """Mutation to add or update a user in a team."""
  upsertUser(role: String!, teamId: UUID!, userId: UUID!): UpsertUserToTeam

  """Mutation to remove a user from a team."""
  removeUserFromTeam(teamId: UUID!, userId: UUID!): RemoveUserFromTeam

  """Mutation to add or update a user in a team."""
  upsertUserToTeam(role: String!, teamId: UUID!, userId: UUID!): UpsertUserToTeam
}

