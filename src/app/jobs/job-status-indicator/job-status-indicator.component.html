@if (hasActiveJobs()) {
  <div class="job-indicator-container">
    <button
      mat-icon-button
      class="job-indicator-button"
      [matMenuTriggerFor]="jobMenu"
      matTooltip="Active Jobs"
      matTooltipPosition="below"
    >
      <mat-icon [class.running-indicator]="hasRunningJobs()">
        {{ hasRunningJobs() ? 'sync' : 'pending_actions' }}
      </mat-icon>
      @if (activeJobCount() > 0) {
        <span class="job-count-badge">{{ activeJobCount() }}</span>
      }
    </button>

    <mat-menu #jobMenu="matMenu" class="job-status-menu" xPosition="before">
      <div
        class="job-menu-content"
        (click)="$event.stopPropagation()"
        (keydown.enter)="$event.stopPropagation()"
        tabindex="0"
        role="group"
      >
        <app-job-status-bar [data]="{ title: 'Active Jobs', panelOpenState: false }" />
      </div>
    </mat-menu>
  </div>
}
