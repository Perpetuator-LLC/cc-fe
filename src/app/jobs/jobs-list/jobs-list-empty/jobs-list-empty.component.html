<div class="empty-state">
  <div class="empty-state-content">
    <mat-icon class="empty-state-icon">work_off</mat-icon>
    <h3 class="empty-state-title">No Jobs Found</h3>
    <p class="empty-state-message">
      @if (statusFilter) {
        No jobs found with status "{{ statusFilterLabel }}". Try changing the filter or create a new job.
      } @else {
        No jobs have been created yet. Jobs will appear here once you start running processes.
      }
    </p>
  </div>
</div>
