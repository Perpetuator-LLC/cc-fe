<div class="filter-container-top-right">
  <mat-form-field appearance="outline" class="status-filter-compact">
    <mat-select [value]="statusFilter" (selectionChange)="onChange($event.value)" placeholder="All Statuses">
      @for (option of statusOptions; track option.value) {
        <mat-option [value]="option.value">{{ option.label }}</mat-option>
      }
    </mat-select>
  </mat-form-field>
</div>
