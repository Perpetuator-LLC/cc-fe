<ng-template #toolbarTemplate>
  <span>Team</span>
</ng-template>
<app-message></app-message>

<mat-card class="team-card">
  <mat-card-content>
    <div [hidden]="!loading">
      <div class="loading-spinner">
        <mat-spinner></mat-spinner>
      </div>
    </div>

    <form [formGroup]="teamForm" (ngSubmit)="saveTeam()">
      <div class="member-row">
        <mat-form-field appearance="fill">
          <mat-label>Team Name</mat-label>
          <input matInput formControlName="name" />
        </mat-form-field>
      </div>
    </form>
  </mat-card-content>
</mat-card>

<mat-card class="members-card">
  <mat-card-header>
    <mat-card-title> Members </mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <form [formGroup]="newUserForm" (ngSubmit)="addOrUpdateUserInTeam()">
      <div class="member-row">
        <div>
          <app-user-autocomplete
            #autocomplete
            [users]="allUsers"
            (userSelected)="onUserSelected($event)"
          ></app-user-autocomplete>
        </div>
        <div>
          <mat-form-field>
            <mat-label>Role</mat-label>
            <mat-select formControlName="role">
              @for (role of supportedRoles; track role) {
                <mat-option value="{{ role }}">{{ role | titlecase }}</mat-option>
              }
            </mat-select>
          </mat-form-field>
        </div>
        <div>
          <button mat-flat-button color="primary" type="submit">Add or Update User</button>
        </div>
      </div>
    </form>

    <mat-table [dataSource]="teamForm.get('members')?.value || []">
      <!-- Username Column -->
      <ng-container matColumnDef="username">
        <mat-header-cell *matHeaderCellDef> Username </mat-header-cell>
        <mat-cell *matCellDef="let member">
          {{ member.user.username }}
        </mat-cell>
      </ng-container>

      <!-- Role Column -->
      <ng-container matColumnDef="role">
        <mat-header-cell *matHeaderCellDef> Role </mat-header-cell>
        <mat-cell *matCellDef="let member">
          {{ member.role | titlecase }}
        </mat-cell>
      </ng-container>

      <!-- Actions Column -->
      <ng-container matColumnDef="actions">
        <mat-header-cell *matHeaderCellDef> Actions </mat-header-cell>
        <mat-cell *matCellDef="let member">
          <button mat-icon-button color="warn" type="button" (click)="removeUserFromTeam(member.user.id)">
            <mat-icon>delete</mat-icon>
          </button>
        </mat-cell>
      </ng-container>

      <!-- Header and Row Declarations -->
      <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
      <mat-row *matRowDef="let row; columns: displayedColumns"></mat-row>
    </mat-table>
  </mat-card-content>
</mat-card>

<mat-card class="danger-zone">
  <mat-card-header>
    <mat-card-title> Danger Zone </mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <mat-accordion>
      <mat-expansion-panel>
        <mat-expansion-panel-header>
          <mat-panel-title> Delete Team </mat-panel-title>
          <mat-panel-description> This action is irreversible. </mat-panel-description>
        </mat-expansion-panel-header>
        <p>Are you sure you want to delete this team?</p>
        <div class="action-row">
          <mat-form-field appearance="fill">
            <mat-label>Delete Confirmation</mat-label>
            <input
              matInput
              placeholder="Type team name '{{ teamForm.get('name')?.value }}' to confirm"
              [(ngModel)]="deleteConfirmation"
            />
          </mat-form-field>
          <button mat-flat-button color="warn" type="button" (click)="deleteTeamDialog()">Delete Team</button>
        </div>
      </mat-expansion-panel>
    </mat-accordion>
  </mat-card-content>
</mat-card>
