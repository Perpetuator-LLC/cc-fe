<ng-template #toolbarTemplate>
  <span>Update Team</span>
</ng-template>
<app-message></app-message>

<mat-card class="container-card">
  @if (loading) {
    <div class="loading-spinner">
      <mat-spinner></mat-spinner>
    </div>
  }

  <form [formGroup]="teamForm" (ngSubmit)="saveTeam()">
    <div class="member-row">
      <mat-form-field appearance="fill">
        <mat-label>Team Name</mat-label>
        <input matInput formControlName="name" />
      </mat-form-field>
      <button mat-flat-button color="primary" type="submit">Save</button>
    </div>
  </form>

  <mat-expansion-panel>
    <mat-expansion-panel-header>
      <mat-panel-title> Members </mat-panel-title>
    </mat-expansion-panel-header>

    <mat-table [dataSource]="teamForm.get('members')?.value || []">
      <!-- Username Column -->
      <ng-container matColumnDef="username">
        <mat-header-cell *matHeaderCellDef> Username </mat-header-cell>
        <mat-cell *matCellDef="let member">
          {{ member.user.username }}
        </mat-cell>
      </ng-container>

      <!-- Role Column -->
      <ng-container matColumnDef="role">
        <mat-header-cell *matHeaderCellDef> Role </mat-header-cell>
        <mat-cell *matCellDef="let member">
          {{ member.role | titlecase }}
        </mat-cell>
      </ng-container>

      <!-- Actions Column -->
      <ng-container matColumnDef="actions">
        <mat-header-cell *matHeaderCellDef> Actions </mat-header-cell>
        <mat-cell *matCellDef="let member">
          <button mat-icon-button color="warn" type="button" (click)="removeUserFromTeam(member.user.id)">
            <mat-icon>delete</mat-icon>
          </button>
        </mat-cell>
      </ng-container>

      <!-- Header and Row Declarations -->
      <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
      <mat-row *matRowDef="let row; columns: displayedColumns"></mat-row>
    </mat-table>
  </mat-expansion-panel>
</mat-card>

<mat-divider></mat-divider>

<form [formGroup]="newUserForm" (ngSubmit)="addOrUpdateUserInTeam()">
  <div class="member-row">
    <app-user-autocomplete (userSelected)="onUserSelected($event)"></app-user-autocomplete>
    <mat-form-field>
      <mat-label>Role</mat-label>
      <mat-select formControlName="role">
        @for (role of supportedRoles; track role) {
          <mat-option value="{{ role }}">{{ role | titlecase }}</mat-option>
        }
      </mat-select>
    </mat-form-field>
    <button mat-flat-button color="primary" type="submit">Add or Update User</button>
  </div>
</form>
