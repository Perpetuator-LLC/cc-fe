<ng-template #toolbarTemplate>
  <h1>Email Verification</h1>
</ng-template>
<app-message></app-message>
<mat-card class="change-email-card">
  <mat-card-header>
    <mat-card-title>Email change cancellation</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <div class="verification-container">
      @if (changeStatus) {
        <p>{{ changeStatus }}</p>
      } @else {
        <p>Canceling your email change, please wait...</p>
      }
    </div>
  </mat-card-content>
</mat-card>
