<div class="dividends-view">
  <div class="dividends-header">
    <span class="dividends-title">Dividend Analysis</span>
    <mat-slide-toggle
      [checked]="showOperatingCashFlow()"
      (change)="toggleOperatingCashFlow()"
      matTooltip="Show Operating Cash Flow in comparison chart"
    >
      Show Op. Cash Flow
    </mat-slide-toggle>
  </div>

  @switch (viewState) {
    @case ('loading') {
      <div class="content-loading">
        <mat-spinner diameter="40" />
        <p>Loading dividend analysis...</p>
      </div>
    }
    @case ('error') {
      <div class="chart-error">
        <mat-icon>error_outline</mat-icon>
        <p>{{ error }}</p>
      </div>
    }
    @case ('empty') {
      <div class="no-data-message">
        <mat-icon>info</mat-icon>
        <p>No dividend data available for this symbol.</p>
      </div>
    }
    @case ('ready') {
      <!-- Key Metrics Cards -->
      <app-dividend-metrics [metrics]="formattedMetrics()" />

      <!-- Charts Grid -->
      <div class="dividend-charts-grid">
        <div class="dividend-chart">
          <div class="chart-title-row">
            <app-chart-info
              [tooltip]="
                CHART_DEFINITIONS.yearlyDividendsChart.title + ': ' + CHART_DEFINITIONS.yearlyDividendsChart.description
              "
            />
          </div>
          <div echarts [options]="charts!.yearlyDividends" class="dividend-echart"></div>
        </div>
        <div class="dividend-chart">
          <div class="chart-title-row">
            <app-chart-info
              [tooltip]="
                CHART_DEFINITIONS.payoutRatioChart.title + ': ' + CHART_DEFINITIONS.payoutRatioChart.description
              "
            />
          </div>
          <div echarts [options]="charts!.payoutRatio" class="dividend-echart"></div>
        </div>
        <div class="dividend-chart full-width">
          <div class="chart-title-row">
            <app-chart-info
              [tooltip]="
                CHART_DEFINITIONS.cashFlowComparisonChart.title +
                ': ' +
                CHART_DEFINITIONS.cashFlowComparisonChart.description
              "
            />
          </div>
          <div echarts [options]="charts!.cashFlowComparison" class="dividend-echart"></div>
        </div>
      </div>

      <!-- Data Table -->
      <app-dividend-data-table [rows]="enrichedYearlyData()" />
    }
  }
</div>
