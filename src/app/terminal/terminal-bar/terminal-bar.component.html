<div class="terminal-bar" (click)="openTerminal()" matTooltip="Open terminal (⌘1 or Ctrl+K)">
  <mat-icon class="terminal-icon">terminal</mat-icon>

  @if (lastEntry(); as last) {
    <div class="last-command">
      <span class="prompt">&gt;</span>
      <span class="command">{{ last.input }}</span>
    </div>
    @if (isProcessing()) {
      <mat-spinner diameter="16" />
    } @else if (last.result) {
      <mat-icon class="status-icon" [class.success]="last.result.success" [class.error]="!last.result.success">
        {{ last.result.success ? 'check_circle' : 'error' }}
      </mat-icon>
    }
  } @else {
    <div class="placeholder">
      <span>Type a command or ask a question...</span>
    </div>
  }

  <div class="shortcut-hint"><kbd>⌘</kbd><kbd>1</kbd></div>
</div>
