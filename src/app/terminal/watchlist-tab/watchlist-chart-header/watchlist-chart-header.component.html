<div class="chart-header">
  <div class="chart-title">
    <div>
      @if (companyName) {
        <span class="company-name" [matTooltip]="symbolInfoTooltip" matTooltipClass="quote-tooltip">{{
          companyName
        }}</span>
      }
      <span class="symbol-name" [matTooltip]="symbolInfoTooltip" matTooltipClass="quote-tooltip">{{
        selectedSymbol
      }}</span>
    </div>
    @if (showQuote) {
      <div
        class="quote-data"
        [class.positive]="isPositiveChange"
        [class.negative]="!isPositiveChange"
        [matTooltip]="quoteTooltip"
        matTooltipClass="quote-tooltip"
      >
        <span class="price">{{ quotePrice }}</span>
        <span class="change">{{ quoteChange }}</span>
        <span class="change-percent">({{ quoteChangePercent }})</span>
      </div>
    }
    <!-- Symbol metadata chips - clickable to navigate to system watchlists -->
    <div class="symbol-metadata">
      @if (exchange) {
        <button
          mat-button
          class="metadata-chip exchange"
          (click)="onMetadataClick('exchange', exchange)"
          [matTooltip]="'View all ' + exchange + ' stocks'"
        >
          {{ exchange }}
        </button>
      }
      @if (sector) {
        <button
          mat-button
          class="metadata-chip sector"
          (click)="onMetadataClick('sector', sector)"
          [matTooltip]="'View all ' + sector + ' stocks'"
        >
          {{ sector }}
        </button>
      }
      @if (industry) {
        <button
          mat-button
          class="metadata-chip industry"
          (click)="onMetadataClick('industry', industry)"
          [matTooltip]="'View all ' + industry + ' stocks'"
        >
          {{ industry }}
        </button>
      }
      @if (showMarketCap) {
        <span class="metadata-chip market-cap" matTooltip="Market Capitalization">
          {{ marketCap }}
        </span>
      }
    </div>
  </div>
  <button
    mat-stroked-button
    type="button"
    class="view-menu-trigger"
    [matMenuTriggerFor]="viewMenu"
    [matTooltip]="(currentAction()?.label || 'Select view') + ' — click to switch view'"
  >
    <mat-icon>{{ currentAction()?.icon || 'visibility' }}</mat-icon>
    <span>{{ currentAction()?.label || 'Select view' }}</span>
    <mat-icon iconPositionEnd>arrow_drop_down</mat-icon>
  </button>
  <mat-menu #viewMenu="matMenu" class="view-menu">
    @for (action of actions; track action.command) {
      <button
        mat-menu-item
        type="button"
        [class.active]="action.command === currentCommand"
        (click)="onActionSelect(action.command)"
      >
        <mat-icon>{{ action.icon }}</mat-icon>
        <span>{{ action.label }}</span>
      </button>
    }
  </mat-menu>
</div>
