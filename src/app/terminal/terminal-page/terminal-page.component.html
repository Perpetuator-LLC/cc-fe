<div class="terminal-page">
  <app-terminal-bar />

  <div class="content-container">
    @switch (routingService.tab()) {
      @case ('watchlists') {
        <app-watchlist-tab />
      }
      @case ('dashboards') {
        <app-terminal-dashboard />
      }
      @case ('history') {
        <app-history-tab
          [rows]="enrichedHistory()"
          [totalCount]="historyTotalCount"
          [showDuplicates]="showDuplicates()"
          [hasMore]="hasMoreHistory"
          [loading]="historyLoading()"
          (showDuplicatesChange)="onShowDuplicatesChange($event)"
          (panelOpened)="onPanelOpened($event)"
          (rerun)="rerunCommand($event)"
          (copyCommand)="copyToClipboard($event)"
          (loadMore)="loadMoreHistory()"
        />
      }
      @case ('help') {
        <app-help-tab
          [loading]="helpLoading()"
          [help]="help"
          [overviewHtml]="helpOverviewHtml"
          [helpDisplay]="helpDisplay"
        />
      }
    }
  </div>
</div>
