<div class="financial-table-container">
  @if (title) {
    <h4 class="table-title">{{ title }}</h4>
  }
  <div class="table-scroll">
    <table class="financial-table">
      <thead>
        <tr>
          <th class="metric-header">Metric</th>
          @for (year of data.years; track year) {
            <th>{{ year }}</th>
          }
        </tr>
      </thead>
      <tbody>
        @for (row of rowsDisplay; track row.label) {
          <tr>
            <td class="metric-name">{{ row.label }}</td>
            @for (cell of row.cells; track $index) {
              <td [class.warning]="cell.highlight" [class.negative]="cell.negative">
                {{ cell.formatted }}
              </td>
            }
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
