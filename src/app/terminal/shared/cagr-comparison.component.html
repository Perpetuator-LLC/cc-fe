<div class="cagr-comparison">
  @for (item of itemsDisplay; track item.label) {
    <div class="cagr-row" [title]="item.tooltip || ''">
      <span class="cagr-label">{{ item.label }}</span>
      <div class="cagr-values">
        <div class="cagr-item">
          <span class="cagr-period">5Y</span>
          <span
            class="cagr-value"
            [class.positive]="item.cagr5Year && item.cagr5Year > 0"
            [class.negative]="item.cagr5Year && item.cagr5Year < 0"
            [class.na]="item.cagr5Year === null"
          >
            {{ item.cagr5YearFormatted }}
          </span>
        </div>
        <div class="cagr-item">
          <span class="cagr-period">10Y</span>
          <span
            class="cagr-value"
            [class.positive]="item.cagr10Year && item.cagr10Year > 0"
            [class.negative]="item.cagr10Year && item.cagr10Year < 0"
            [class.na]="item.cagr10Year === null"
          >
            {{ item.cagr10YearFormatted }}
          </span>
        </div>
        @if (showTrendIndicator && item.cagr5Year !== null && item.cagr10Year !== null) {
          <mat-icon
            class="trend-icon"
            [class.improving]="item.cagr5Year > item.cagr10Year"
            [class.declining]="item.cagr5Year < item.cagr10Year"
          >
            {{ item.trendIcon }}
          </mat-icon>
        }
      </div>
    </div>
  }
</div>
