#
# Staging docker-compose for stage.capitalcopilot.io.
#
# Pulls the pre-built image from GHCR rather than building locally — the
# image is published by .github/workflows/build-and-publish.yml after PR
# checks pass on main.
#
# Runtime configuration is sourced from .env.stage, which is generated by
# scripts/generate-env-from-vault-runtime.sh on each deploy.

services:
  frontend:
    container_name: cc-fe-stage-angular
    image: ghcr.io/perpetuator-llc/cc-fe:latest
    pull_policy: always
    ports:
      - "4481:80"
    restart: unless-stopped
    env_file:
      - .env.stage
    environment:
      - NODE_ENV=production
      - PORT=80
      - VIRTUAL_HOST=stage.capitalcopilot.io
      - VIRTUAL_PATH=/
      - LETSENCRYPT_HOST=stage.capitalcopilot.io
      - LETSENCRYPT_EMAIL=admin@perpetuator.io
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - nginx-proxy
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

networks:
  nginx-proxy:
    external: true
