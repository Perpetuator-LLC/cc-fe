#
# Staging docker-compose for stage.capitalcopilot.io.
#
# Image: pulled from GHCR (built by .github/workflows/build-and-publish.yml
# on push to main). No local build on lestrange.
#
# Runtime configuration: the container itself fetches CC_FE_* secrets from
# OpenBao at startup. Lestrange's AppRole credential files are mounted
# read-only into the container; docker-entrypoint.sh uses them to authenticate,
# fetches the secrets, exports them as env vars, revokes the token, then
# exec's the SSR server. No .env.stage on disk, no secrets in `docker inspect`.

services:
  frontend:
    container_name: cc-fe-stage-angular
    # IMAGE_TAG defaults to :latest for ad-hoc local runs (e.g. `docker compose up`
    # on a fresh checkout). The deploy pipeline sets IMAGE_TAG=sha-<commit> so we
    # deploy the exact image we just verified, and so rollback is one variable
    # away (`IMAGE_TAG=sha-<old> docker compose up -d`).
    image: ghcr.io/perpetuator-llc/cc-fe:${IMAGE_TAG:-latest}
    pull_policy: always
    ports:
      - "4481:80"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=80
      # Tells docker-entrypoint.sh to fetch CC_FE_* from OpenBao at startup.
      # Without these two vars, the entrypoint would expect CC_FE_* directly.
      - VAULT_ADDR=https://vault.perpetuator.io
      - VAULT_PATH=secret/services/cc-fe/staging
      # AppRole credentials for the container to authenticate to OpenBao.
      # Passed through from the deploy environment (deploy workflow sets
      # them from Gitea secrets; ad-hoc `docker compose up` can set them
      # via shell exports or a sibling .env file). The container uses
      # them ONCE at startup to exchange for a short-lived token, then
      # immediately revokes the token. Values never persist on disk.
      #
      # NOTE: we used to mount /etc/vault from the host instead, but the
      # Gitea runner is Docker-in-Docker — the deployed container runs
      # inside DinD, where the host's /etc/vault is invisible. Env-var
      # passthrough works regardless of runtime environment.
      - VAULT_ROLE_ID=${VAULT_ROLE_ID}
      - VAULT_SECRET_ID=${VAULT_SECRET_ID}
      # nginx-proxy + LE companion read these to provision the TLS cert and
      # route traffic. They are NOT secrets.
      - VIRTUAL_HOST=stage.capitalcopilot.io
      - VIRTUAL_PATH=/
      - LETSENCRYPT_HOST=stage.capitalcopilot.io
      - LETSENCRYPT_EMAIL=admin@perpetuator.io
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - nginx-proxy
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

networks:
  nginx-proxy:
    external: true
