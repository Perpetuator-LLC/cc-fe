<h1 mat-dialog-title>{{ data.title || 'Confirm Action' }}</h1>
<div mat-dialog-content [innerHTML]="data.message"></div>
@if (!data.hideActions) {
  <div mat-dialog-actions>
    <button mat-button (click)="onCancel()">Cancel</button>
    <button mat-button (click)="onConfirm()">Confirm</button>
  </div>
}
