schema: 'src/app/schema.graphql'
documents: 'src/app/**/*.ts'
generates:
  src/app/graphql-types.ts:
    plugins:
      - 'typescript'
      - 'typescript-operations'
      - 'typescript-apollo-angular'
    config:
      declarationKind:
        union: type
        type: interface
        input: interface
        scalar: interface
        arguments: interface
        interface: interface
      enumsAsTypes: true
      includeDirectives: true
      commentDescriptions: true
      flattenGeneratedTypes: true
      avoidOptionals: true
      strictScalars: true
      scalars:
        String: string
        Int: number
        Float: number
        Boolean: boolean
        ID: string
        UUID: string
        DateTime: string
        JSONString: string
