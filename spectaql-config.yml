spectaql:
  logoFile: ./public/Capital_Copilot_Logo_PFP.png
  targetDir: ./docs/graphql

introspection:
  schemaFile: ./src/app/schema.graphql

info:
  title: Capital Copilot API
  description: |
    Complete GraphQL API documentation for Capital Copilot.

    ## Authentication

    All API requests require authentication via:

    - **OAuth2 Bearer Token**: `Authorization: Bearer YOUR_TOKEN`
    - **API Key**: `Authorization: ApiKey YOUR_API_KEY`

    ## Scopes

    - `read`: Read access to your data
    - `write`: Create and modify data
    - `ai:generate`: Access AI generation endpoints
    - `ai:analyze`: Access AI analysis endpoints

  contact:
    name: API Support
    email: support@capitalcopilot.io
    url: https://capitalcopilot.io/support

servers:
  - url: https://api.capitalcopilot.io/graphql/
    description: Production API
    production: true
  - url: http://localhost:8000/graphql/
    description: Development API
    production: false

extensions:
  graphqlScalarExamples: true
