<?xml version="1.0" encoding="UTF-8"?>
<svg
  version="1.1"
  viewBox="0 0 26 26"
  xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .dot-1 {
        fill: #fff;
      }
      .dot-2 {
        fill: #fff;
      }
      .trail-1 {
        fill: none;
        stroke: #fff;
        stroke-width: 4;
        stroke-linecap: round;
      }
      .trail-2 {
        fill: none;
        stroke: #fff;
        stroke-width: 4;
        stroke-linecap: round;
      }
    </style>
  </defs>

  <circle
    class="dot-2"
    cx="16" cy="4" r="2"
    opacity="0">
    <animate
      fill="freeze"
      attributeName="opacity"
      dur="0.3s"
      from="0"
      to="1"
      begin="0.2s" />
  </circle>

  <circle
    class="dot-1"
    cx="10" cy="10" r="2"
    opacity="0">
    <animate
      fill="freeze"
      attributeName="opacity"
      dur="0.3s"
      from="0"
      to="1"
      begin="0.4s" />
  </circle>

  <circle
    class="dot-2"
    cx="16" cy="16" r="2"
    opacity="0">
    <animate
      fill="freeze"
      attributeName="opacity"
      dur="0.2s"
      from="0"
      to="1"
      begin="0.5s" />
  </circle>

  <circle
    class="dot-1"
    cx="10" cy="22" r="2"
    opacity="0">
    <animate
      fill="freeze"
      attributeName="opacity"
      dur="0.3s"
      from="0"
      to="1"
      begin="0.3s" />
  </circle>

  <path
    class="trail-2"
    d="M 10,4 A 6,6 0 1,0 10,16"
    stroke-dasharray="18.85"
    stroke-dashoffset="18.85">
    <animate
      fill="freeze"
      attributeName="stroke-dashoffset"
      dur="2s"
      from="18.85"
      to="0"
      begin="0s" />
  </path>

  <path
    class="trail-1"
    d="M 16,22 A 6,6 0 1,0 16,10"
    stroke-dasharray="18.85"
    stroke-dashoffset="18.85">
    <animate
      fill="freeze"
      attributeName="stroke-dashoffset"
      dur="2s"
      from="18.85"
      to="0"
      begin="0s" />
  </path>
