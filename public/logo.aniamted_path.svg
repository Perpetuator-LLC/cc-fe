<?xml version="1.0" encoding="UTF-8"?>
<svg
  version="1.1"
  viewBox="0 0 26 26"
  xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .dot {
        fill: none;
        stroke-width: 4;
        stroke-linecap: square;
      }
      .stroke-path {
        fill: none;
        stroke-width: 4;
        stroke-linecap: square;
        stroke-linejoin: bevel;
      }

      /* Colors - customize these */
      .color-1 { stroke: #888; }
      .color-2 { stroke: #ccc; }
      .color-3 { stroke: #888; }
      .color-4 { stroke: #ccc; }
      .color-5 { stroke: #888; }
      .color-6 { stroke: #ccc; }
    </style>
  </defs>

  <!-- DOTS (appear at random times) -->

  <!-- Dot 1: (8,2) scaled to (16,4) -->
  <circle
    class="dot color-1"
    cx="16" cy="4" r="0.1"
    stroke-dasharray="0.628"
    stroke-dashoffset="0.628">
    <animate
      fill="freeze"
      attributeName="stroke-dashoffset"
      dur="0.1s"
      from="0.628"
      to="0"
      begin="0.2s" />
  </circle>

  <!-- Dot 2: (5,5) scaled to (10,10) -->
  <circle
    class="dot color-2"
    cx="10" cy="10" r="0.1"
    stroke-dasharray="0.628"
    stroke-dashoffset="0.628">
    <animate
      fill="freeze"
      attributeName="stroke-dashoffset"
      dur="0.1s"
      from="0.628"
      to="0"
      begin="0.5s" />
  </circle>

  <!-- Dot 3: (8,8) scaled to (16,16) -->
  <circle
    class="dot color-3"
    cx="16" cy="16" r="0.1"
    stroke-dasharray="0.628"
    stroke-dashoffset="0.628">
    <animate
      fill="freeze"
      attributeName="stroke-dashoffset"
      dur="0.1s"
      from="0.628"
      to="0"
      begin="0.8s" />
  </circle>

  <!-- Dot 4: (5,11) scaled to (10,22) -->
  <circle
    class="dot color-4"
    cx="10" cy="22" r="0.1"
    stroke-dasharray="0.628"
    stroke-dashoffset="0.628">
    <animate
      fill="freeze"
      attributeName="stroke-dashoffset"
      dur="0.1s"
      from="0.628"
      to="0"
      begin="0.3s" />
  </circle>

  <!-- STROKES (animate in specified order after dots) -->

  <!-- Stroke 1: (5,8) → (2,8) → (2,2) → (5,2) -->
  <!-- Scaled: (10,16) → (4,16) → (4,4) → (10,4) -->
  <path
    class="stroke-path color-5"
    d="M 10,16 L 4,16 L 4,4 L 10,4"
    stroke-dasharray="30"
    stroke-dashoffset="30">
    <animate
      fill="freeze"
      attributeName="stroke-dashoffset"
      dur="1.0s"
      from="30"
      to="0"
      begin="1.0s" />
  </path>

  <!-- Stroke 2: (8,5) → (11,5) → (11,11) → (8,11) -->
  <!-- Scaled: (16,10) → (22,10) → (22,22) → (16,22) -->
  <path
    class="stroke-path color-6"
    d="M 16,10 L 22,10 L 22,22 L 16,22"
    stroke-dasharray="30"
    stroke-dashoffset="30">
    <animate
      fill="freeze"
      attributeName="stroke-dashoffset"
      dur="1.0s"
      from="30"
      to="0"
      begin="1.0s" />
  </path>
</svg>
