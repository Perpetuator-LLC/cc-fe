<?xml version="1.0" encoding="UTF-8"?>
<svg
  version="1.1"
  viewBox="0 0 26 26"
  xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .dot {
        fill: #888;
      }
      .trail {
        fill: none;
        stroke: #888;
        stroke-width: 4;
        stroke-linecap: round;
      }
    </style>
  </defs>

  <!-- Middle dot 1 with pulsating animation -->
  <circle
    class="dot"
    cx="10" cy="10" r="2">
    <animate
      attributeName="r"
      dur=".6s"
      from="2"
      to="3"
      repeatCount="indefinite"
      values="2;3;2"
      keyTimes="0;0.5;1" />
    <animate
      attributeName="opacity"
      dur=".8s"
      from="1"
      to="0.5"
      repeatCount="indefinite"
      values="1;0.5;1"
      keyTimes="0;0.5;1" />
  </circle>

  <!-- Middle dot 2 with pulsating animation -->
  <circle
    class="dot"
    cx="16" cy="16" r="2">
    <animate
      attributeName="r"
      dur=".7s"
      from="2"
      to="3"
      repeatCount="indefinite"
      values="2;3;2"
      keyTimes="0;0.5;1" />
    <animate
      attributeName="opacity"
      dur=".7s"
      from="1"
      to="0.5"
      repeatCount="indefinite"
      values="1;0.5;1"
      keyTimes="0;0.5;1" />
  </circle>

  <!-- Path 1 with forward and backward bouncing animation -->
  <path
    class="trail"
    d="M 10,4 A 6,6 0 1,0 10,16"
    stroke-dasharray="18.85"
    stroke-dashoffset="18.85">
    <animate
      attributeName="stroke-dashoffset"
      dur="1.3s"
      repeatCount="indefinite"
      values="18.85;0;18.85"
      keyTimes="0;0.5;1"
      calcMode="spline"
      keySplines="0.42 0 0.58 1; 0.42 0 0.58 1" />
  </path>

  <!-- Path 2 with forward and backward bouncing animation -->
  <path
    class="trail"
    d="M 16,22 A 6,6 0 1,0 16,10"
    stroke-dasharray="18.85"
    stroke-dashoffset="18.85">
    <animate
      attributeName="stroke-dashoffset"
      dur="1.5s"
      repeatCount="indefinite"
      values="18.85;0;18.85"
      keyTimes="0;0.5;1"
      calcMode="spline"
      keySplines="0.42 0 0.58 1; 0.42 0 0.58 1" />
  </path>
</svg>
