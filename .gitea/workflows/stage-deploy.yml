# Copyright (c) 2024-2026 Perpetuator LLC
#
# Deploy to staging environment on push to stage branch
# Trigger: Push or merge to `stage` branch
# Target: stage.capitalcopilot.io on lestrange
#
# CI gate mirrors local pre-commit + pre-push hooks:
#   audit  — CVE scan (mirrors pre-push: yarn audit, high/critical only)
#   lint   — ESLint + stylelint + MD3 + unused SCSS + format check (mirrors lint-staged)
#   test   — Full unit test suite (mirrors pre-push: npm test)
#   deploy — Only runs when audit + lint + test all pass
#   notify — Emails the commit author when any job fails

name: Deploy to Staging

on:
  push:
    branches:
      - stage
  workflow_dispatch:

env:
  STAGE_PATH: /mnt/storage1/stage.capitalcopilot.io
  COMPOSE_PROJECT_NAME: cc-fe-stage

jobs:
  # ---------------------------------------------------------------------------
  # Shared setup macro: clone repo + ensure yarn is available
  # Re-used by audit, lint, and test jobs via separate work dirs
  # ---------------------------------------------------------------------------

  audit:
    runs-on: deploy-host
    steps:
      - name: Checkout code
        env:
          GITEA_TOKEN: ${{ gitea.token }}
        run: |
          WORK_DIR="/tmp/cc-fe-audit-checkout"
          rm -rf ${WORK_DIR}
          git clone --depth 1 --branch ${{ github.ref_name }} \
            https://oauth2:${GITEA_TOKEN}@git.perpetuator.io/${{ github.repository }}.git \
            ${WORK_DIR}
          command -v yarn || npm install -g yarn

      - name: Dependency vulnerability scan
        run: |
          cd /tmp/cc-fe-audit-checkout
          # yarn audit exit codes are bitmasks (4=moderate, 8=high, 16=critical).
          # --audit-level does NOT suppress the bitmask in yarn v1, so grep instead.
          AUDIT_OUTPUT=$(yarn audit 2>&1) || true
          echo "$AUDIT_OUTPUT"
          if echo "$AUDIT_OUTPUT" | grep -qE "^│ (high|critical)"; then
            echo "❌ High or Critical CVEs found — deployment blocked."
            exit 1
          fi
          echo "✅ No high or critical CVEs found."

  lint:
    runs-on: deploy-host
    steps:
      - name: Checkout code
        env:
          GITEA_TOKEN: ${{ gitea.token }}
        run: |
          WORK_DIR="/tmp/cc-fe-lint-checkout"
          rm -rf ${WORK_DIR}
          git clone --depth 1 --branch ${{ github.ref_name }} \
            https://oauth2:${GITEA_TOKEN}@git.perpetuator.io/${{ github.repository }}.git \
            ${WORK_DIR}
          command -v yarn || npm install -g yarn

      - name: Install dependencies
        run: |
          cd /tmp/cc-fe-lint-checkout
          yarn install --frozen-lockfile

      - name: Lint (ESLint + stylelint + MD3 + format check)
        run: |
          cd /tmp/cc-fe-lint-checkout
          # Mirrors lint-staged + yarn lint:all:
          #   yarn lint          → ng lint (ESLint)
          #   yarn lint:scss     → stylelint
          #   yarn lint:md3      → MD3 compliance check
          #   yarn lint:scss:unused:strict → unused SCSS check
          #   yarn format:check  → Prettier format check
          yarn lint:all

      - name: Cleanup
        if: always()
        run: rm -rf /tmp/cc-fe-lint-checkout

  test:
    runs-on: deploy-host
    steps:
      - name: Checkout code
        env:
          GITEA_TOKEN: ${{ gitea.token }}
        run: |
          WORK_DIR="/tmp/cc-fe-test-checkout"
          rm -rf ${WORK_DIR}
          git clone --depth 1 --branch ${{ github.ref_name }} \
            https://oauth2:${GITEA_TOKEN}@git.perpetuator.io/${{ github.repository }}.git \
            ${WORK_DIR}
          command -v yarn || npm install -g yarn

      - name: Install dependencies
        run: |
          cd /tmp/cc-fe-test-checkout
          yarn install --frozen-lockfile

      - name: Run unit tests
        env:
          # CI=true makes Angular's default Karma config use ChromeHeadless
          CI: "true"
          # Disable Chrome sandbox for CI environments
          CHROMIUM_FLAGS: "--no-sandbox --disable-gpu"
        run: |
          cd /tmp/cc-fe-test-checkout
          yarn test

      - name: Cleanup
        if: always()
        run: rm -rf /tmp/cc-fe-test-checkout

  deploy:
    runs-on: deploy-host
    needs: [audit, lint, test]
    steps:
      - name: Checkout code
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITEA_TOKEN: ${{ gitea.token }}
        run: |
          # Debug: Show available variables (without exposing secrets)
          echo "GITHUB_TOKEN length: ${#GITHUB_TOKEN}"
          echo "GITEA_TOKEN length: ${#GITEA_TOKEN}"
          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref_name }}"
          
          WORK_DIR="/tmp/cc-fe-stage-checkout"
          
          # Try GITHUB_TOKEN first, fall back to GITEA_TOKEN
          if [ -n "${GITHUB_TOKEN}" ]; then
            TOKEN="${GITHUB_TOKEN}"
            echo "Using GITHUB_TOKEN"
          elif [ -n "${GITEA_TOKEN}" ]; then
            TOKEN="${GITEA_TOKEN}"
            echo "Using GITEA_TOKEN"
          else
            echo "ERROR: No token available"
            exit 1
          fi
          
          REPO_URL="https://oauth2:${TOKEN}@git.perpetuator.io/${{ github.repository }}.git"
          BRANCH="${{ github.ref_name }}"
          
          rm -rf ${WORK_DIR}
          git clone --depth 1 --branch ${BRANCH} ${REPO_URL} ${WORK_DIR}
          
          echo "Checkout complete"
          ls -la ${WORK_DIR}

      - name: Verify deployment path
        run: |
          echo "Deploying to: ${{ env.STAGE_PATH }}"
          mkdir -p ${{ env.STAGE_PATH }}

      - name: Sync code to deployment path
        run: |
          WORK_DIR="/tmp/cc-fe-stage-checkout"
          /usr/bin/rsync -av --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude 'dist' \
            --exclude 'logs/*' \
            --exclude '.env' \
            --exclude '.env.*' \
            --exclude '.vscode' \
            --exclude '.idea' \
            --exclude '*.log' \
            ${WORK_DIR}/ ${{ env.STAGE_PATH }}/

      - name: Generate environment from OpenBao
        env:
          VAULT_ADDR: https://vault.perpetuator.io
          ROLE_ID_FILE: /etc/vault/vault-role-id
          SECRET_ID_FILE: /etc/vault/vault-secret-id
        run: |
          cd ${{ env.STAGE_PATH }}
          chmod +x scripts/generate-env-from-vault.sh
          ./scripts/generate-env-from-vault.sh secret/services/cc-fe/staging

      - name: Build and deploy containers
        working-directory: ${{ env.STAGE_PATH }}
        run: |
          # Use staging docker-compose file with explicit project name
          COMPOSE_FILE="docker-compose.stage.yml"
          PROJECT_NAME="cc-fe-stage"

          # Build images with staging tag
          /usr/bin/docker compose -p ${PROJECT_NAME} -f ${COMPOSE_FILE} build --progress=plain

          # Force stop and remove existing staging containers
          /usr/bin/docker ps -a --filter "name=cc-fe-stage" --format "{{.ID}}" | xargs -r /usr/bin/docker rm -f || true

          # Start new containers
          /usr/bin/docker compose -p ${PROJECT_NAME} -f ${COMPOSE_FILE} up -d

      - name: Health check
        run: |
          # Wait for services to stabilize
          sleep 15
          
          # Check Express SSR server health
          if /usr/bin/curl -sf http://localhost:4481/ > /dev/null; then
            echo "✅ Frontend is healthy"
          else
            echo "⚠️ Frontend health check failed (may need more time)"
            # Wait a bit more and retry
            sleep 15
            if /usr/bin/curl -sf http://localhost:4481/ > /dev/null; then
              echo "✅ Frontend is healthy (second attempt)"
            else
              echo "❌ Frontend health check failed"
              /usr/bin/docker logs cc-fe-stage-angular --tail 50
              exit 1
            fi
          fi

      - name: Show deployment status
        run: |
          echo "=========================================="
          echo "Staging Deployment Complete!"
          echo "=========================================="
          echo "URL: https://stage.capitalcopilot.io"
          echo ""
          echo "Container Status:"
          /usr/bin/docker ps --filter "name=cc-fe-stage" --format "table {{.Names}}	{{.Status}}	{{.Ports}}"
          echo "=========================================="

      - name: Cleanup
        if: always()
        run: |
          rm -rf /tmp/cc-fe-stage-checkout

  # ---------------------------------------------------------------------------
  # Notify the commit author by email when any job fails
  # Requires: mailutils (apt install mailutils) or sendmail on deploy-host
  # ---------------------------------------------------------------------------
  notify:
    runs-on: deploy-host
    needs: [audit, lint, test, deploy]
    if: failure()
    steps:
      - name: Send failure email
        env:
          GITEA_TOKEN: ${{ gitea.token }}
          ACTOR: ${{ github.actor }}
          RUN_ID: ${{ github.run_id }}
          COMMIT_SHA: ${{ github.sha }}
          BRANCH: ${{ github.ref_name }}
          SERVER_URL: ${{ gitea.server_url }}
          REPO: ${{ github.repository }}
        run: |
          # Fetch the commit author's email from the Gitea API
          AUTHOR_EMAIL=$(curl -sf \
            -H "Authorization: token ${GITEA_TOKEN}" \
            "${SERVER_URL}/api/v1/repos/${REPO}/git/commits/${COMMIT_SHA}" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('commit',{}).get('author',{}).get('email',''))" 2>/dev/null || true)

          if [ -z "${AUTHOR_EMAIL}" ]; then
            echo "⚠️ Could not determine author email — skipping notification."
            exit 0
          fi

          SHORT_SHA="${COMMIT_SHA:0:7}"
          RUN_URL="${SERVER_URL}/${REPO}/actions/runs/${RUN_ID}"
          SUBJECT="❌ CI failed on ${BRANCH} (${SHORT_SHA})"
          BODY="One or more CI checks failed for your commit on branch '${BRANCH}'.

Commit:  ${SHORT_SHA}
Author:  ${ACTOR}
Run URL: ${RUN_URL}

Failed jobs may include: audit (CVE scan), lint (ESLint/stylelint), test (unit tests), or deploy.

Check the run URL above for details and fix the issues before the build can be promoted to staging."

          if command -v sendmail &> /dev/null; then
            printf "To: %s\nSubject: %s\n\n%s\n" "${AUTHOR_EMAIL}" "${SUBJECT}" "${BODY}" | sendmail "${AUTHOR_EMAIL}"
            echo "✅ Failure notification sent to ${AUTHOR_EMAIL}"
          elif command -v mail &> /dev/null; then
            echo "${BODY}" | mail -s "${SUBJECT}" "${AUTHOR_EMAIL}"
            echo "✅ Failure notification sent to ${AUTHOR_EMAIL}"
          else
            echo "⚠️ No mail transport available (install mailutils on deploy-host)."
            echo "   Would have emailed: ${AUTHOR_EMAIL}"
            echo "   Subject: ${SUBJECT}"
          fi
