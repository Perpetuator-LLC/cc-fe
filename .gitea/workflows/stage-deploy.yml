# Copyright (c) 2024-2026 Perpetuator LLC
#
# Deploy a pre-built cc-fe image to stage.capitalcopilot.io on lestrange.
#
# Triggered by:
#   - workflow_dispatch from .github/workflows/build-and-publish.yml after a
#     successful GHCR push on main (the normal auto-deploy path)
#   - Manual dispatch from the Gitea Actions UI (recovery / re-deploy)
#   - push to main (defense in depth — if dispatch is somehow missed, mirror
#     sync will eventually fire; in practice this rarely triggers because
#     Gitea Actions doesn't usually fire push events on mirror sync)
#
# What this workflow does NOT do (and why):
#   - No audit / lint / test. Those run on GitHub Actions before merge AND
#     again on the post-merge build. The image being deployed was built
#     FROM the exact code that passed those checks — re-running here would
#     add 5-10 min to every deploy with no new signal.
#
# What this workflow DOES verify:
#   - Image manifest exists at the expected SHA tag (catches a missing
#     GHCR push, e.g. registry hiccup)
#   - Smoke test: image starts cleanly with dummy config and serves /health
#     (catches a broken entrypoint, missing curl/jq, etc. BEFORE we
#     swap the running container)
#   - Final health check post-swap (catches mis-mounted vault creds,
#     OpenBao path missing keys, etc.)

name: Deploy to Staging

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  STAGE_PATH: /mnt/storage1/stage.capitalcopilot.io
  COMPOSE_PROJECT_NAME: cc-fe-stage
  GHCR_IMAGE: ghcr.io/perpetuator-llc/cc-fe

jobs:
  deploy:
    runs-on: deploy-host
    steps:
      - name: Resolve target image tag
        id: target
        run: |
          # Use the SHA tag to pin to the exact commit being deployed.
          # This guarantees we deploy what GitHub built — not a moving
          # :latest that could race with a newer push.
          SHORT_SHA="${GITHUB_SHA:0:7}"
          IMAGE="${{ env.GHCR_IMAGE }}:sha-${SHORT_SHA}"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "Target image: ${IMAGE}"

      - name: Checkout compose file
        env:
          GITEA_TOKEN: ${{ gitea.token }}
        run: |
          WORK_DIR="/tmp/cc-fe-stage-checkout"
          rm -rf ${WORK_DIR}
          git clone --depth 1 --branch ${{ github.ref_name }} \
            https://oauth2:${GITEA_TOKEN}@git.perpetuator.io/${{ github.repository }}.git \
            ${WORK_DIR}

      - name: Sync compose file to deploy path
        run: |
          mkdir -p ${{ env.STAGE_PATH }}
          /usr/bin/rsync -av \
            /tmp/cc-fe-stage-checkout/docker-compose.stage.yml \
            ${{ env.STAGE_PATH }}/docker-compose.stage.yml

      # The Gitea runner uses Docker-in-Docker (DinD) with its own isolated
      # daemon — the host's /root/.docker/config.json is NOT mounted in.
      # So `docker login` on the host has no effect here; we must auth the
      # runner's DinD daemon directly, every job.
      #
      # Requires the Gitea repo secret GHCR_PULL_TOKEN — a classic GitHub PAT
      # with `read:packages` scope only (fine-grained PATs don't yet support
      # GHCR for org packages). Create at:
      #   github.com → Settings → Developer settings → Tokens (classic)
      # Then add to Gitea: Repo Settings → Actions → Secrets → New Secret
      #   Name:  GHCR_PULL_TOKEN
      #   Value: (the PAT)
      - name: Login to GHCR (runner's DinD daemon)
        env:
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
        run: |
          if [ -z "${GHCR_PULL_TOKEN}" ]; then
            echo "::error::GHCR_PULL_TOKEN secret not set in Gitea."
            echo "Create a GitHub classic PAT with read:packages scope, then add it as"
            echo "a Gitea repo secret named GHCR_PULL_TOKEN."
            echo "See docs/deployment.md for full instructions."
            exit 1
          fi
          echo "${GHCR_PULL_TOKEN}" | /usr/bin/docker login ghcr.io \
            -u perpetuator-llc --password-stdin >/dev/null
          echo "✅ Authenticated to GHCR"

      - name: Pull image (verifies it exists AND warms cache for smoke test)
        run: |
          # Using docker pull instead of docker manifest inspect because
          # `manifest inspect` is an experimental command whose availability
          # and behavior varies across Docker versions/registries — it has
          # been observed to return "no such manifest" for tags that
          # `docker pull` successfully retrieves.
          #
          # Retry loop handles the GHCR propagation race: the
          # build-and-publish.yml workflow on GitHub dispatches us within
          # ~4s of completing the push, but GHCR's CDN propagation is
          # variable. Observed in production: sometimes ready within
          # seconds, sometimes >60s, occasionally needing several minutes.
          # When the auto-deploy fails, a manual re-run a few minutes
          # later always works — so we retry up to 5 minutes total
          # (30 attempts × 10s) to cover the slowest tail. Each
          # individual `docker pull` is fast on failure so the cost of
          # a high retry count is small.
          #
          # Side benefit: pull populates the local image cache, so the
          # next smoke test step's `docker run` and the final
          # `docker compose pull` are both fast (no re-download).
          IMAGE="${{ steps.target.outputs.image }}"
          MAX_ATTEMPTS=30
          for attempt in $(seq 1 ${MAX_ATTEMPTS}); do
            if /usr/bin/docker pull "${IMAGE}"; then
              echo "✅ Image pulled successfully (attempt ${attempt}/${MAX_ATTEMPTS})"
              exit 0
            fi
            if [ "${attempt}" -lt "${MAX_ATTEMPTS}" ]; then
              echo "⏳ Pull failed (attempt ${attempt}/${MAX_ATTEMPTS}). Likely registry propagation — retrying in 10s..."
              sleep 10
            fi
          done
          echo "❌ Failed to pull ${IMAGE} after ${MAX_ATTEMPTS} attempts (~5 min)."
          echo "   This is beyond observed GHCR propagation. Check:"
          echo "   - GitHub Actions build for this commit:"
          echo "     https://github.com/Perpetuator-LLC/cc-fe/commit/${{ github.sha }}/checks"
          echo "   - The GHCR package page for the sha-XXX tag:"
          echo "     https://github.com/Perpetuator-LLC/cc-fe/pkgs/container/cc-fe"
          exit 1

      - name: Smoke test (verify image boots and serves /health)
        run: |
          # Run the image in isolation with placeholder env vars (no Vault,
          # no real backend) just to confirm the entrypoint executes cleanly
          # and the Express server starts. Doesn't validate config correctness.
          SMOKE_NAME="cc-fe-smoke-${{ github.run_id }}"
          /usr/bin/docker rm -f ${SMOKE_NAME} 2>/dev/null || true

          /usr/bin/docker run -d --name ${SMOKE_NAME} \
            -e CC_FE_API_URL=https://smoke-test.invalid \
            -e CC_FE_SITE_URL=https://smoke-test.invalid \
            -e CC_FE_OAUTH_ISSUER=https://smoke-test.invalid \
            -e CC_FE_OAUTH_CLIENT_ID=smoke-test \
            -e CC_FE_OAUTH_SCOPES='read write' \
            -e CC_FE_STRIPE_PUBLIC_KEY=pk_test_smoke \
            "${{ steps.target.outputs.image }}" >/dev/null

          # Give the SSR server up to 30s to bind to port 80.
          HEALTHY=false
          for i in $(seq 1 30); do
            if /usr/bin/docker exec ${SMOKE_NAME} wget -q --spider http://localhost:80/health 2>/dev/null; then
              HEALTHY=true
              echo "✅ Smoke test passed (image boots and serves /health) after ${i}s"
              break
            fi
            sleep 1
          done

          if [ "$HEALTHY" != "true" ]; then
            echo "❌ Smoke test FAILED — image didn't serve /health within 30s"
            echo "Container logs:"
            /usr/bin/docker logs ${SMOKE_NAME} --tail 80
            /usr/bin/docker rm -f ${SMOKE_NAME} 2>/dev/null || true
            exit 1
          fi

          /usr/bin/docker rm -f ${SMOKE_NAME} 2>/dev/null || true

      - name: (Re)start container at the verified SHA
        working-directory: ${{ env.STAGE_PATH }}
        env:
          # Pin the deployed image to the SHA we just verified and smoke-tested.
          # docker-compose.stage.yml's `image:` line is templated with
          # ${IMAGE_TAG:-latest}, so this env var deterministically selects
          # what gets deployed. If we left it as :latest, a concurrent newer
          # build could race in and we'd deploy something we never verified.
          IMAGE_TAG: sha-${{ steps.target.outputs.short_sha }}
          # AppRole creds passed through to the container so its entrypoint
          # can authenticate to OpenBao and pull CC_FE_* config at startup.
          # The runner's DinD doesn't have /etc/vault from the host, so
          # we can't bind-mount the credential files — env vars instead.
          # Required Gitea secrets: VAULT_ROLE_ID, VAULT_SECRET_ID
          # (see docs/deployment.md for setup).
          VAULT_ROLE_ID: ${{ secrets.VAULT_ROLE_ID }}
          VAULT_SECRET_ID: ${{ secrets.VAULT_SECRET_ID }}
        run: |
          COMPOSE_FILE="docker-compose.stage.yml"
          PROJECT_NAME="cc-fe-stage"

          # Validate the AppRole secrets exist before touching the container.
          # Without these the container would crash-loop on startup, so
          # better to fail the deploy with a clear error here.
          if [ -z "${VAULT_ROLE_ID}" ] || [ -z "${VAULT_SECRET_ID}" ]; then
            echo "::error::VAULT_ROLE_ID and/or VAULT_SECRET_ID Gitea secrets are not set."
            echo "Add them in the Gitea repo Settings → Actions → Secrets."
            echo "See docs/deployment.md for instructions."
            exit 1
          fi

          # Image is already in local cache from the verify step above, so
          # docker compose pull is a no-op — but we still run it to catch any
          # mid-deploy registry interruption before tearing down the container.
          /usr/bin/docker compose -p ${PROJECT_NAME} -f ${COMPOSE_FILE} pull

          # Graceful recreate; no need to docker rm -f first.
          /usr/bin/docker compose -p ${PROJECT_NAME} -f ${COMPOSE_FILE} up -d --remove-orphans

      - name: Post-deploy health check
        run: |
          # Wait briefly for the new container to bind to its host port.
          sleep 10

          for i in 1 2 3; do
            if /usr/bin/curl -sf http://localhost:4481/health > /dev/null; then
              echo "✅ stage.capitalcopilot.io is healthy"
              exit 0
            fi
            echo "  attempt $i — waiting 10s for the new container..."
            sleep 10
          done

          echo "❌ Frontend health check failed after the new container deployed."
          /usr/bin/docker logs cc-fe-stage-angular --tail 80
          exit 1

      - name: Show deployment status
        if: always()
        run: |
          echo "=========================================="
          echo "Staging Deployment"
          echo "=========================================="
          echo "URL:    https://stage.capitalcopilot.io"
          echo "Image:  ${{ steps.target.outputs.image }}"
          echo "Commit: ${{ github.sha }}"
          echo ""
          /usr/bin/docker ps --filter "name=cc-fe-stage" \
            --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}\t{{.Image}}"
          echo "=========================================="

      - name: Cleanup
        if: always()
        run: |
          rm -rf /tmp/cc-fe-stage-checkout
          /usr/bin/docker rm -f cc-fe-smoke-${{ github.run_id }} 2>/dev/null || true
          # Scrub GHCR credentials from the runner's docker config.
          # Job containers are ephemeral anyway, but this keeps the runner's
          # /root/.docker/config.json clean if anything is mounted/persistent.
          /usr/bin/docker logout ghcr.io >/dev/null 2>&1 || true

  # ---------------------------------------------------------------------------
  # Notify the commit author by email when the deploy fails.
  # Requires: mailutils (apt install mailutils) or sendmail on deploy-host.
  # ---------------------------------------------------------------------------
  notify:
    runs-on: deploy-host
    needs: [deploy]
    if: failure()
    steps:
      - name: Send failure email
        env:
          GITEA_TOKEN: ${{ gitea.token }}
          ACTOR: ${{ github.actor }}
          RUN_ID: ${{ github.run_id }}
          COMMIT_SHA: ${{ github.sha }}
          BRANCH: ${{ github.ref_name }}
          SERVER_URL: ${{ gitea.server_url }}
          REPO: ${{ github.repository }}
        run: |
          # Fetch the commit author's email from the Gitea API
          AUTHOR_EMAIL=$(curl -sf \
            -H "Authorization: token ${GITEA_TOKEN}" \
            "${SERVER_URL}/api/v1/repos/${REPO}/git/commits/${COMMIT_SHA}" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('commit',{}).get('author',{}).get('email',''))" 2>/dev/null || true)

          if [ -z "${AUTHOR_EMAIL}" ]; then
            echo "⚠️ Could not determine author email — skipping notification."
            exit 0
          fi

          SHORT_SHA="${COMMIT_SHA:0:7}"
          RUN_URL="${SERVER_URL}/${REPO}/actions/runs/${RUN_ID}"
          SUBJECT="❌ Stage deploy failed on ${BRANCH} (${SHORT_SHA})"
          BODY=$(printf "The stage deploy failed for your commit on branch '%s'.\n\nCommit:  %s\nAuthor:  %s\nRun URL: %s\n\nLikely causes: image not yet published, smoke test failure (broken entrypoint), or post-deploy health check failure (vault creds, OpenBao path).\n\nCheck the run URL above for details." "${BRANCH}" "${SHORT_SHA}" "${ACTOR}" "${RUN_URL}")

          if command -v sendmail &> /dev/null; then
            printf "To: %s\nSubject: %s\n\n%s\n" "${AUTHOR_EMAIL}" "${SUBJECT}" "${BODY}" | sendmail "${AUTHOR_EMAIL}"
            echo "✅ Failure notification sent to ${AUTHOR_EMAIL}"
          elif command -v mail &> /dev/null; then
            echo "${BODY}" | mail -s "${SUBJECT}" "${AUTHOR_EMAIL}"
            echo "✅ Failure notification sent to ${AUTHOR_EMAIL}"
          else
            echo "⚠️ No mail transport available (install mailutils on deploy-host)."
            echo "   Would have emailed: ${AUTHOR_EMAIL}"
            echo "   Subject: ${SUBJECT}"
          fi
