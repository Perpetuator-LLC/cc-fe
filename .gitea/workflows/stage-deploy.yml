# Copyright (c) 2024-2026 Perpetuator LLC
#
# Deploy to staging environment on push to main branch
# Trigger: Push or merge to `main` branch (the integration branch)
# Target: stage.capitalcopilot.io on lestrange
#
# Note: the deployed environment is still called "stage" — only the
# source branch changed from `stage` to `main` as part of the
# main-as-integration cutover. Container names, env paths, and the
# compose file keep their `stage` naming since that is the environment
# identity, not the source branch.
#
# CI gate mirrors local pre-commit + pre-push hooks:
#   audit  — CVE scan (mirrors pre-push: yarn audit, high/critical only)
#   lint   — ESLint + stylelint + MD3 + unused SCSS + format check (mirrors lint-staged)
#   test   — Full unit test suite (mirrors pre-push: npm test)
#   deploy — Only runs when audit + lint + test all pass
#   notify — Emails the commit author when any job fails

name: Deploy to Staging

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  STAGE_PATH: /mnt/storage1/stage.capitalcopilot.io
  COMPOSE_PROJECT_NAME: cc-fe-stage

jobs:
  # ---------------------------------------------------------------------------
  # All Node operations run inside Docker (node:22-alpine / node:22) because
  # the deploy-host runner does not have node/npm/yarn in PATH.
  #
  # IMPORTANT: We use "docker create + docker cp + docker wait" instead of
  # "docker run -v" because if the act runner itself runs inside Docker
  # (DinD), volume bind-mounts reference the runner container's /tmp paths,
  # which are invisible to the host Docker daemon — resulting in empty /app.
  # "docker cp" transfers files through the Docker API and always works.
  # ---------------------------------------------------------------------------

  audit:
    runs-on: deploy-host
    steps:
      - name: Checkout code
        env:
          GITEA_TOKEN: ${{ gitea.token }}
        run: |
          WORK_DIR="/tmp/cc-fe-audit-checkout"
          rm -rf ${WORK_DIR}
          git clone --depth 1 --branch ${{ github.ref_name }} \
            https://oauth2:${GITEA_TOKEN}@git.perpetuator.io/${{ github.repository }}.git \
            ${WORK_DIR}

      - name: Dependency vulnerability scan
        run: |
          # yarn audit exit codes are bitmasks — grep for high/critical instead.
          CNAME="cc-fe-audit-${{ github.run_id }}"
          /usr/bin/docker rm -f ${CNAME} 2>/dev/null || true

          /usr/bin/docker create --name ${CNAME} \
            -w /app \
            node:22-alpine \
            sh -c 'npm install -g yarn --quiet 2>/dev/null; yarn audit 2>&1 || true'

          # docker cp goes through the Docker API — works even in DinD
          /usr/bin/docker cp /tmp/cc-fe-audit-checkout/. ${CNAME}:/app/

          /usr/bin/docker start ${CNAME}
          /usr/bin/docker wait ${CNAME}
          AUDIT_OUTPUT=$(/usr/bin/docker logs ${CNAME} 2>&1)
          /usr/bin/docker rm ${CNAME} || true

          echo "$AUDIT_OUTPUT"
          if echo "$AUDIT_OUTPUT" | grep -qE "^│ (high|critical)"; then
            echo "❌ High or Critical CVEs found — deployment blocked."
            exit 1
          fi
          echo "✅ No high or critical CVEs found."

      - name: Cleanup
        if: always()
        run: |
          /usr/bin/docker rm -f cc-fe-audit-${{ github.run_id }} 2>/dev/null || true
          rm -rf /tmp/cc-fe-audit-checkout

  lint:
    runs-on: deploy-host
    steps:
      - name: Checkout code
        env:
          GITEA_TOKEN: ${{ gitea.token }}
        run: |
          WORK_DIR="/tmp/cc-fe-lint-checkout"
          rm -rf ${WORK_DIR}
          git clone --depth 1 --branch ${{ github.ref_name }} \
            https://oauth2:${GITEA_TOKEN}@git.perpetuator.io/${{ github.repository }}.git \
            ${WORK_DIR}

      - name: Lint (ESLint + stylelint + MD3 + format check)
        run: |
          # Mirrors lint-staged + yarn lint:all:
          #   yarn lint          → ng lint (ESLint)
          #   yarn lint:scss     → stylelint
          #   yarn lint:md3      → MD3 compliance check
          #   yarn lint:scss:unused:strict → unused SCSS check
          #   yarn format:check  → Prettier format check
          CNAME="cc-fe-lint-${{ github.run_id }}"
          /usr/bin/docker rm -f ${CNAME} 2>/dev/null || true

          /usr/bin/docker create --name ${CNAME} \
            -w /app \
            node:22-alpine \
            sh -c 'npm install -g yarn --quiet 2>/dev/null; yarn install --frozen-lockfile && yarn lint:all'

          /usr/bin/docker cp /tmp/cc-fe-lint-checkout/. ${CNAME}:/app/

          /usr/bin/docker start ${CNAME}
          EXIT_CODE=$(/usr/bin/docker wait ${CNAME})
          /usr/bin/docker logs ${CNAME} 2>&1
          /usr/bin/docker rm ${CNAME} || true
          exit ${EXIT_CODE}

      - name: Cleanup
        if: always()
        run: |
          /usr/bin/docker rm -f cc-fe-lint-${{ github.run_id }} 2>/dev/null || true
          rm -rf /tmp/cc-fe-lint-checkout

  test:
    runs-on: deploy-host
    steps:
      - name: Checkout code
        env:
          GITEA_TOKEN: ${{ gitea.token }}
        run: |
          WORK_DIR="/tmp/cc-fe-test-checkout"
          rm -rf ${WORK_DIR}
          git clone --depth 1 --branch ${{ github.ref_name }} \
            https://oauth2:${GITEA_TOKEN}@git.perpetuator.io/${{ github.repository }}.git \
            ${WORK_DIR}
          # environment.ts is gitignored (loaded from OpenBao in staging builds).
          # For unit tests, copy the sample stub so TypeScript can compile.
          if [ ! -f "${WORK_DIR}/src/environments/environment.ts" ]; then
            cp "${WORK_DIR}/src/environments/sample.environment.ts" \
               "${WORK_DIR}/src/environments/environment.ts"
          fi

      - name: Run unit tests
        run: |
          # node:22 (Debian) so Chromium can be installed via apt.
          # CI=true  → Angular/Karma selects ChromeHeadless automatically.
          # CHROMIUM_FLAGS → karma-chrome-launcher adds --no-sandbox etc.
          # --shm-size=2g  → prevents Chrome from crashing on /dev/shm limits.
          CNAME="cc-fe-test-${{ github.run_id }}"
          /usr/bin/docker rm -f ${CNAME} 2>/dev/null || true

          /usr/bin/docker create --name ${CNAME} \
            -w /app \
            -e CI=true \
            -e CHROMIUM_FLAGS='--no-sandbox --disable-dev-shm-usage' \
            --shm-size=2g \
            node:22 \
            sh -c 'apt-get update -qq && apt-get install -y -q chromium && \
                   export CHROME_BIN=$(which chromium) && \
                   npm install -g yarn --quiet 2>/dev/null; \
                   yarn install --frozen-lockfile && \
                   yarn test -- --browsers=ChromeHeadless --watch=false --progress=false'

          /usr/bin/docker cp /tmp/cc-fe-test-checkout/. ${CNAME}:/app/

          /usr/bin/docker start ${CNAME}
          EXIT_CODE=$(/usr/bin/docker wait ${CNAME})
          /usr/bin/docker logs ${CNAME} 2>&1
          /usr/bin/docker rm ${CNAME} || true
          exit ${EXIT_CODE}

      - name: Cleanup
        if: always()
        run: |
          /usr/bin/docker rm -f cc-fe-test-${{ github.run_id }} 2>/dev/null || true
          rm -rf /tmp/cc-fe-test-checkout

  deploy:
    runs-on: deploy-host
    needs: [audit, lint, test]
    steps:
      - name: Checkout code
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITEA_TOKEN: ${{ gitea.token }}
        run: |
          # Debug: Show available variables (without exposing secrets)
          echo "GITHUB_TOKEN length: ${#GITHUB_TOKEN}"
          echo "GITEA_TOKEN length: ${#GITEA_TOKEN}"
          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref_name }}"
          
          WORK_DIR="/tmp/cc-fe-stage-checkout"
          
          # Try GITHUB_TOKEN first, fall back to GITEA_TOKEN
          if [ -n "${GITHUB_TOKEN}" ]; then
            TOKEN="${GITHUB_TOKEN}"
            echo "Using GITHUB_TOKEN"
          elif [ -n "${GITEA_TOKEN}" ]; then
            TOKEN="${GITEA_TOKEN}"
            echo "Using GITEA_TOKEN"
          else
            echo "ERROR: No token available"
            exit 1
          fi
          
          REPO_URL="https://oauth2:${TOKEN}@git.perpetuator.io/${{ github.repository }}.git"
          BRANCH="${{ github.ref_name }}"
          
          rm -rf ${WORK_DIR}
          git clone --depth 1 --branch ${BRANCH} ${REPO_URL} ${WORK_DIR}
          
          echo "Checkout complete"
          ls -la ${WORK_DIR}

      - name: Verify deployment path
        run: |
          echo "Deploying to: ${{ env.STAGE_PATH }}"
          mkdir -p ${{ env.STAGE_PATH }}

      - name: Sync code to deployment path
        run: |
          WORK_DIR="/tmp/cc-fe-stage-checkout"
          /usr/bin/rsync -av --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude 'dist' \
            --exclude 'logs/*' \
            --exclude '.env' \
            --exclude '.env.*' \
            --exclude '.vscode' \
            --exclude '.idea' \
            --exclude '*.log' \
            ${WORK_DIR}/ ${{ env.STAGE_PATH }}/

      - name: Generate environment from OpenBao
        env:
          VAULT_ADDR: https://vault.perpetuator.io
          ROLE_ID_FILE: /etc/vault/vault-role-id
          SECRET_ID_FILE: /etc/vault/vault-secret-id
        run: |
          cd ${{ env.STAGE_PATH }}
          chmod +x scripts/generate-env-from-vault.sh
          ./scripts/generate-env-from-vault.sh secret/services/cc-fe/staging

      - name: Build and deploy containers
        working-directory: ${{ env.STAGE_PATH }}
        run: |
          # Use staging docker-compose file with explicit project name
          COMPOSE_FILE="docker-compose.stage.yml"
          PROJECT_NAME="cc-fe-stage"

          # Build images with staging tag
          /usr/bin/docker compose -p ${PROJECT_NAME} -f ${COMPOSE_FILE} build --progress=plain

          # Force stop and remove existing staging containers
          /usr/bin/docker ps -a --filter "name=cc-fe-stage" --format "{{.ID}}" | xargs -r /usr/bin/docker rm -f || true

          # Start new containers
          /usr/bin/docker compose -p ${PROJECT_NAME} -f ${COMPOSE_FILE} up -d

      - name: Health check
        run: |
          # Wait for services to stabilize
          sleep 15
          
          # Check Express SSR server health
          if /usr/bin/curl -sf http://localhost:4481/ > /dev/null; then
            echo "✅ Frontend is healthy"
          else
            echo "⚠️ Frontend health check failed (may need more time)"
            # Wait a bit more and retry
            sleep 15
            if /usr/bin/curl -sf http://localhost:4481/ > /dev/null; then
              echo "✅ Frontend is healthy (second attempt)"
            else
              echo "❌ Frontend health check failed"
              /usr/bin/docker logs cc-fe-stage-angular --tail 50
              exit 1
            fi
          fi

      - name: Show deployment status
        run: |
          echo "=========================================="
          echo "Staging Deployment Complete!"
          echo "=========================================="
          echo "URL: https://stage.capitalcopilot.io"
          echo ""
          echo "Container Status:"
          /usr/bin/docker ps --filter "name=cc-fe-stage" --format "table {{.Names}}	{{.Status}}	{{.Ports}}"
          echo "=========================================="

      - name: Cleanup
        if: always()
        run: |
          rm -rf /tmp/cc-fe-stage-checkout

  # ---------------------------------------------------------------------------
  # Notify the commit author by email when any job fails
  # Requires: mailutils (apt install mailutils) or sendmail on deploy-host
  # ---------------------------------------------------------------------------
  notify:
    runs-on: deploy-host
    needs: [audit, lint, test, deploy]
    if: failure()
    steps:
      - name: Send failure email
        env:
          GITEA_TOKEN: ${{ gitea.token }}
          ACTOR: ${{ github.actor }}
          RUN_ID: ${{ github.run_id }}
          COMMIT_SHA: ${{ github.sha }}
          BRANCH: ${{ github.ref_name }}
          SERVER_URL: ${{ gitea.server_url }}
          REPO: ${{ github.repository }}
        run: |
          # Fetch the commit author's email from the Gitea API
          AUTHOR_EMAIL=$(curl -sf \
            -H "Authorization: token ${GITEA_TOKEN}" \
            "${SERVER_URL}/api/v1/repos/${REPO}/git/commits/${COMMIT_SHA}" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('commit',{}).get('author',{}).get('email',''))" 2>/dev/null || true)

          if [ -z "${AUTHOR_EMAIL}" ]; then
            echo "⚠️ Could not determine author email — skipping notification."
            exit 0
          fi

          SHORT_SHA="${COMMIT_SHA:0:7}"
          RUN_URL="${SERVER_URL}/${REPO}/actions/runs/${RUN_ID}"
          SUBJECT="❌ CI failed on ${BRANCH} (${SHORT_SHA})"
          BODY=$(printf "One or more CI checks failed for your commit on branch '%s'.\n\nCommit:  %s\nAuthor:  %s\nRun URL: %s\n\nFailed jobs may include: audit (CVE scan), lint (ESLint/stylelint), test (unit tests), or deploy.\n\nCheck the run URL above for details and fix the issues before the build can be promoted to staging." "${BRANCH}" "${SHORT_SHA}" "${ACTOR}" "${RUN_URL}")

          if command -v sendmail &> /dev/null; then
            printf "To: %s\nSubject: %s\n\n%s\n" "${AUTHOR_EMAIL}" "${SUBJECT}" "${BODY}" | sendmail "${AUTHOR_EMAIL}"
            echo "✅ Failure notification sent to ${AUTHOR_EMAIL}"
          elif command -v mail &> /dev/null; then
            echo "${BODY}" | mail -s "${SUBJECT}" "${AUTHOR_EMAIL}"
            echo "✅ Failure notification sent to ${AUTHOR_EMAIL}"
          else
            echo "⚠️ No mail transport available (install mailutils on deploy-host)."
            echo "   Would have emailed: ${AUTHOR_EMAIL}"
            echo "   Subject: ${SUBJECT}"
          fi
