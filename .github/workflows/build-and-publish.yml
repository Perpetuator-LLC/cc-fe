#
# Build, scan, and (conditionally) publish the cc-fe Docker image to GHCR.
#
# Triggers:
#   - pull_request to main    → build + Trivy scan only (NO push to GHCR)
#                               This validates the image builds and is secure
#                               before merge, without polluting the registry
#                               with per-PR artifacts.
#   - push to main            → build + scan + publish :latest + :sha-<hash>
#   - tag matching v*         → also publishes semver tags (e.g. :1.2.3)
#   - workflow_dispatch       → manual trigger; pushes only when run on
#                               main/tag (not on feature branches).
#
# Trivy gate: build fails on CRITICAL or HIGH severity CVEs with a known
# fix available. Unfixed issues are ignored (can't act on them until
# upstream patches).
#
# Why scan PRs without publishing: an unpublished image still produces a
# Trivy report in the Actions logs/PR checks, so reviewers can see the
# scan result without having a half-baked image floating around GHCR.

name: Build, Scan & Publish Docker Image

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  pull-requests: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: build-and-publish-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Pre-publish gate. `yarn audit` sees the FULL dependency tree (incl. devDeps);
  # the Trivy scan below only sees the runtime image, so a high/critical CVE in a
  # devDependency is invisible to Trivy but caught here. The malware scan blocks
  # publishing an image built from injected source. build-scan-publish `needs`
  # this, so nothing reaches GHCR (and no Gitea deploy is dispatched) when it's
  # red. Mirrors pr-checks.yml and the pre-push hook.
  audit:
    name: Audit (pre-publish CVE + malware gate)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Malware signature scan (pure grep, no install)
        run: bash scripts/scan-for-malware.sh

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: yarn

      - name: Yarn audit (block on high/critical only)
        run: |
          # yarn audit exit codes are bitmasks; grep the output instead.
          set +e
          AUDIT_OUTPUT=$(yarn audit 2>&1)
          set -e
          echo "$AUDIT_OUTPUT"
          if echo "$AUDIT_OUTPUT" | grep -qE "^│ (high|critical)"; then
            echo "::error::High or Critical CVEs found — build/publish/deploy blocked."
            exit 1
          fi
          echo "✅ No high or critical CVEs found."

  build-scan-publish:
    name: Build, Trivy scan, push to GHCR
    needs: [audit]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Only log in to GHCR when we're going to push. PRs don't need it
      # since they only build locally.
      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Lowercased to satisfy GHCR's namespace rules.
          flavor: |
            latest=auto
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build image (load locally for scanning)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Resolve scan target tag
        id: scan-target
        run: |
          # Use the SHA tag — guaranteed to exist regardless of trigger.
          SHORT_SHA="${GITHUB_SHA::7}"
          IMAGE_LOWER=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          echo "image=${IMAGE_LOWER}:sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ steps.scan-target.outputs.image }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          vuln-type: os,library
          # Documented exclusions live here. Each entry must have a comment
          # explaining the false-positive rationale or compensating control.
          trivyignores: .trivyignore

      # Push only for branch pushes to main, tag pushes, or manual dispatch.
      # PRs intentionally skip this — the build + scan are the validation;
      # the actual image only lands in GHCR when the PR merges to main.
      - name: Push to GHCR
        if: github.event_name != 'pull_request' && success()
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Kick off the Gitea staging deploy as soon as the image is published
      # on main. This replaces relying on Gitea's mirror-sync to fire push
      # events (which it doesn't, by default).
      #
      # Why not a separate GitHub webhook? Calling from inside this workflow
      # guarantees the deploy ONLY runs after a successful image push —
      # no race condition with the GHCR upload, no need for a wait-for-image
      # poll in the Gitea side.
      #
      # Requires the GitHub repo secret GITEA_DISPATCH_TOKEN — a Gitea API
      # token with at least the "write:repository" scope. Create at:
      #   git.perpetuator.io → Settings → Applications → Generate New Token
      # Then add to GitHub: Settings → Secrets and variables → Actions →
      # New repository secret → Name: GITEA_DISPATCH_TOKEN.
      - name: Trigger Gitea deploy workflow
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && success()
        env:
          GITEA_DISPATCH_TOKEN: ${{ secrets.GITEA_DISPATCH_TOKEN }}
        run: |
          if [ -z "${GITEA_DISPATCH_TOKEN}" ]; then
            echo "::warning::GITEA_DISPATCH_TOKEN secret not set — skipping Gitea dispatch."
            echo "Add the secret in repo Settings → Secrets and variables → Actions."
            echo "Deploy must be triggered manually from Gitea Actions UI for this commit."
            exit 0
          fi
          response=$(curl -sf -w "\n%{http_code}" -X POST \
            -H "Authorization: token ${GITEA_DISPATCH_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"ref":"main","inputs":{}}' \
            "https://git.perpetuator.io/api/v1/repos/perpetuator/cc-fe/actions/workflows/stage-deploy.yml/dispatches" \
            ) || {
              echo "::error::Gitea dispatch failed. Check token scope (write:repository) and workflow filename."
              exit 1
            }
          http_code=$(echo "$response" | tail -n1)
          if [ "$http_code" != "204" ] && [ "$http_code" != "200" ]; then
            echo "::error::Unexpected Gitea response HTTP $http_code"
            echo "$response" | head -n -1
            exit 1
          fi
          echo "✅ Gitea stage-deploy dispatched for ref main"

      - name: Summary
        if: always()
        run: |
          {
            echo "## Build & Publish Summary"
            echo ""
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              echo "**Mode:** PR validation (build + Trivy scan only — no GHCR push)"
            else
              echo "**Mode:** Publish (image pushed to GHCR)"
            fi
            echo ""
            echo "**Image tags:**"
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
            echo ""
            echo "**Trivy scan target:** \`${{ steps.scan-target.outputs.image }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
